<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:wght@400;700&family=Lato:wght@400;700&family=Montserrat:wght@400;700&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 280px; background: #242424; border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar h2 { padding: 12px 16px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #888; border-bottom: 1px solid #333; }

  /* Layers panel */
  #layers-panel { flex: 1; overflow-y: auto; }
  .layer-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer; border-bottom: 1px solid #2a2a2a; font-size: 13px; user-select: none; }
  .layer-item:hover { background: #2e2e2e; }
  .layer-item.selected { background: #3a3a5a; }
  .layer-item .layer-icon { width: 20px; text-align: center; font-size: 14px; flex-shrink: 0; }
  .layer-item .layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .layer-item .layer-actions { display: flex; gap: 4px; }
  .layer-item .layer-actions button { background: none; border: none; color: #888; cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 3px; }
  .layer-item .layer-actions button:hover { color: #fff; background: #444; }
  .layer-item .layer-actions button.active { color: #7aa2f7; }
  .layer-item.hidden-layer { opacity: 0.4; }
  .layer-item.group-child { padding-left: 32px; background: #1e1e2e; border-left: 2px solid #555; }
  .layer-item.group-child:hover { background: #282840; }
  .layer-item .expand-toggle { cursor: pointer; font-size: 10px; margin-right: 2px; color: #888; user-select: none; }
  .layer-item .expand-toggle:hover { color: #fff; }

  /* Layer reorder buttons */
  #layer-controls { padding: 6px 8px; border-bottom: 1px solid #333; display: flex; flex-wrap: wrap; gap: 3px; }
  #layer-controls button { padding: 4px 6px; background: #333; border: 1px solid #444; color: #ccc; border-radius: 4px; cursor: pointer; font-size: 11px; white-space: nowrap; }
  #layer-controls button:hover { background: #444; color: #fff; }

  /* Properties panel */
  #properties-panel { border-top: 1px solid #333; max-height: 50vh; overflow-y: auto; }
  #properties-panel h2 { position: sticky; top: 0; background: #242424; z-index: 1; }
  .prop-group { padding: 8px 16px; }
  .prop-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .prop-row label { width: 32px; font-size: 11px; color: #888; text-transform: uppercase; flex-shrink: 0; }
  .prop-row input { flex: 1; background: #333; border: 1px solid #444; color: #e0e0e0; padding: 4px 6px; border-radius: 3px; font-size: 12px; }
  .prop-row input[type="number"] { width: 60px; }
  .prop-row input[type="color"] { width: 32px; height: 24px; padding: 0; border: none; cursor: pointer; }
  .prop-row input[type="range"] { -webkit-appearance: none; appearance: none; height: 6px; background: #444; border-radius: 3px; border: none; outline: none; cursor: pointer; flex: 1; padding: 0; }
  .prop-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #7aa2f7; border: 2px solid #222; cursor: pointer; }
  .prop-row input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #7aa2f7; border: 2px solid #222; cursor: pointer; }
  .opa-val { width: 36px; text-align: center; font-size: 11px; color: #aaa; flex-shrink: 0; }

  /* Main area */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Toolbar */
  #toolbar { height: 48px; background: #242424; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 16px; gap: 8px; flex-shrink: 0; }
  #toolbar button, #toolbar select { padding: 6px 12px; background: #333; border: 1px solid #444; color: #ccc; border-radius: 4px; cursor: pointer; font-size: 12px; }
  #toolbar button:hover { background: #444; color: #fff; }
  #toolbar .sep { width: 1px; height: 24px; background: #444; margin: 0 4px; }
  #toolbar .group { display: flex; align-items: center; gap: 4px; }
  #toolbar label { font-size: 12px; color: #888; }
  #toolbar select { background: #333; }

  /* Canvas area */
  #canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #111; position: relative; }
  #canvas-wrapper {
    position: relative;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    /* Checkerboard indicates transparent (alpha) background */
    background-color: #2a2a2a;
    background-image:
      linear-gradient(45deg, #3a3a3a 25%, transparent 25%),
      linear-gradient(-45deg, #3a3a3a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #3a3a3a 75%),
      linear-gradient(-45deg, transparent 75%, #3a3a3a 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
  }
  #canvas-wrapper canvas { background: transparent !important; }
  .canvas-container { background: transparent !important; }

  /* Snap guides rendered on canvas by fabric */

  /* Export modal */
  #export-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  #export-modal.show { display: flex; }
  #export-modal .modal { background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 24px; width: 400px; }
  #export-modal h3 { margin-bottom: 16px; }
  #export-modal .row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  #export-modal label { width: 80px; font-size: 13px; color: #aaa; }
  #export-modal input, #export-modal select { flex: 1; padding: 6px 8px; background: #333; border: 1px solid #444; color: #e0e0e0; border-radius: 4px; font-size: 13px; }
  #export-modal .actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  #export-modal .actions button { padding: 8px 20px; border-radius: 4px; border: 1px solid #444; cursor: pointer; font-size: 13px; }
  #export-modal .actions .btn-primary { background: #7aa2f7; color: #111; border-color: #7aa2f7; font-weight: 600; }
  #export-modal .actions .btn-cancel { background: #333; color: #ccc; }
  #quality-display { width: 40px; text-align: center; color: #aaa; font-size: 13px; }

  /* Add element modal */
  #add-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  #add-modal.show { display: flex; }
  #add-modal .modal { background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 24px; width: 360px; }
  #add-modal h3 { margin-bottom: 16px; }
  #add-modal .add-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  #add-modal .add-option { padding: 12px 8px; background: #333; border: 1px solid #444; border-radius: 6px; text-align: center; cursor: pointer; font-size: 12px; }
  #add-modal .add-option:hover { background: #444; border-color: #7aa2f7; }
  #add-modal .add-option .icon { font-size: 22px; display: block; margin-bottom: 4px; }

  /* Brand color picker */
  .color-field { display: flex; align-items: center; gap: 4px; flex: 1; }
  .color-field input[type="color"] { width: 28px; height: 24px; padding: 0; border: none; cursor: pointer; flex-shrink: 0; }
  .color-field .hex-input { width: 68px; background: #333; border: 1px solid #444; color: #e0e0e0; padding: 3px 5px; border-radius: 3px; font-size: 11px; font-family: monospace; }
  .brand-swatches { display: flex; gap: 2px; flex-wrap: wrap; margin-top: 2px; }
  .brand-swatch { width: 16px; height: 16px; border-radius: 3px; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); transition: transform 0.1s; }
  .brand-swatch:hover { transform: scale(1.3); border-color: #fff; z-index: 1; }

  /* Shadow controls */
  .shadow-toggle { display: flex; align-items: center; gap: 6px; }
  .shadow-toggle input[type="checkbox"] { margin: 0; }
  .shadow-fields { margin-top: 4px; }
  .shadow-fields .prop-row { margin-bottom: 4px; }

  /* Tabs bar */
  #tabs-bar { display: flex; align-items: center; background: #1e1e1e; border-bottom: 1px solid #333; padding: 0 8px; height: 36px; flex-shrink: 0; overflow-x: auto; gap: 2px; }
  .tab { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: #2a2a2a; border: 1px solid #333; border-bottom: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 12px; color: #888; white-space: nowrap; user-select: none; max-width: 200px; }
  .tab:hover { background: #333; color: #ccc; }
  .tab.active { background: #333; color: #e0e0e0; border-color: #555; }
  .tab .tab-name { overflow: hidden; text-overflow: ellipsis; }
  .tab .tab-close { font-size: 14px; color: #666; cursor: pointer; padding: 0 2px; border-radius: 2px; line-height: 1; }
  .tab .tab-close:hover { color: #ff6b6b; background: #442222; }
  .tab.tab-add { padding: 6px 10px; font-size: 16px; color: #888; font-weight: 600; background: #242424; }
  .tab.tab-add:hover { color: #7aa2f7; background: #2f2f2f; }

  /* Right-click context menu */
  #context-menu { display: none; position: fixed; z-index: 200; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; padding: 4px 0; min-width: 180px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  #context-menu.show { display: block; }
  #context-menu .ctx-item { padding: 6px 16px; font-size: 12px; color: #ccc; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  #context-menu .ctx-item:hover { background: #3a3a5a; color: #fff; }
  #context-menu .ctx-item .shortcut { color: #666; font-size: 11px; margin-left: 16px; }
  #context-menu .ctx-sep { height: 1px; background: #333; margin: 4px 0; }
  #context-menu .ctx-item.disabled { color: #555; cursor: default; }
  #context-menu .ctx-item.disabled:hover { background: transparent; color: #555; }

  /* Status bar */
  #statusbar { height: 28px; background: #242424; border-top: 1px solid #333; display: flex; align-items: center; padding: 0 16px; font-size: 11px; color: #666; gap: 16px; flex-shrink: 0; }
</style>
</head>
<body>

<!-- Sidebar: Layers + Properties -->
<div id="sidebar">
  <h2>Layers</h2>
  <div id="layer-controls">
    <button onclick="moveLayer('up')" title="Move Up">&#9650;</button>
    <button onclick="moveLayer('down')" title="Move Down">&#9660;</button>
    <button onclick="duplicateLayer()" title="Duplicate (Ctrl+D)">&#10697;</button>
    <button onclick="deleteLayer()" title="Delete">&#10005;</button>
    <button onclick="groupSelected()" title="Group (Ctrl+G)">Grp</button>
    <button onclick="ungroupSelected()" title="Ungroup (Ctrl+Shift+G)">Ungrp</button>
    <button onclick="linkAsBannerGroup()" title="Link polygon+text as Banner Group">&#128279; Link</button>
  </div>
  <div id="layers-panel"></div>

  <div id="properties-panel">
    <h2>Properties</h2>
    <div id="props-content" class="prop-group">
      <p style="color:#666; font-size:12px; padding:8px 0;">Select an element</p>
    </div>
  </div>
</div>

<!-- Main area -->
<div id="main">
  <div id="toolbar">
    <div class="group">
      <label>Preset:</label>
      <select id="preset-select" onchange="loadPreset(this.value)">
        <option value="">-- Load preset --</option>
        <option value="16x9">16:9 (1280x720)</option>
        <option value="1x1">1:1 (800x800)</option>
      </select>
    </div>
    <div class="sep"></div>
    <button onclick="showAddModal()">+ Add Element</button>
    <div class="sep"></div>
    <div class="group">
      <label>Snap:</label>
      <input type="checkbox" id="snap-toggle" checked onchange="snapEnabled=this.checked">
    </div>
    <div class="group">
      <label>Grid:</label>
      <input type="number" id="snap-grid" value="10" min="1" max="50" style="width:50px" onchange="snapGrid=+this.value">
    </div>
    <div class="sep"></div>
    <div class="group">
      <label>Zoom:</label>
      <button onclick="setZoom(zoom-0.1)">-</button>
      <span id="zoom-display" style="font-size:12px;color:#aaa;min-width:40px;text-align:center">100%</span>
      <button onclick="setZoom(zoom+0.1)">+</button>
      <button onclick="setZoom(1)">Fit</button>
    </div>
    <div style="flex:1"></div>
    <button onclick="loadJSON()">Load JSON(s)</button>
    <button onclick="insertPattern()">Insert Pattern</button>
    <button onclick="saveAsPattern()">Save as Pattern</button>
    <button onclick="saveJSON()">Save JSON</button>
    <div class="sep"></div>
    <button onclick="showExportModal()" style="background:#7aa2f7;color:#111;font-weight:600;border-color:#7aa2f7">Export</button>
  </div>

  <div id="tabs-bar"></div>
  <div id="canvas-area">
    <div id="canvas-wrapper">
      <canvas id="c"></canvas>
    </div>
  </div>

  <div id="statusbar">
    <span id="status-size">1280 x 720</span>
    <span id="status-pos">X: 0 Y: 0</span>
    <span id="status-selection">No selection</span>
  </div>
</div>

<!-- Export Modal -->
<div id="export-modal">
  <div class="modal">
    <h3>Export Image</h3>
    <div class="row">
      <label>Format:</label>
      <select id="export-format">
        <option value="webp">WebP</option>
        <option value="jpeg">JPEG</option>
        <option value="png">PNG</option>
      </select>
    </div>
    <div class="row">
      <label>Quality:</label>
      <input type="range" id="export-quality" min="10" max="100" value="85" oninput="document.getElementById('quality-display').textContent=this.value+'%'">
      <span id="quality-display">85%</span>
    </div>
    <div class="row">
      <label>Scale:</label>
      <select id="export-scale">
        <option value="1">1x</option>
        <option value="2" selected>2x (retina)</option>
        <option value="3">3x</option>
      </select>
    </div>
    <div class="actions">
      <button class="btn-cancel" onclick="hideExportModal()">Cancel</button>
      <button class="btn-primary" onclick="doExport()">Export</button>
    </div>
  </div>
</div>

<!-- Add Element Modal -->
<div id="add-modal">
  <div class="modal">
    <h3>Add Element</h3>
    <div class="add-options">
      <div class="add-option" onclick="addText(); hideAddModal();">
        <span class="icon">T</span>Text
      </div>
      <div class="add-option" onclick="addRect(); hideAddModal();">
        <span class="icon">&#9632;</span>Rectangle
      </div>
      <div class="add-option" onclick="addRoundedRect(); hideAddModal();">
        <span class="icon" style="font-size:20px">&#9644;</span>Rounded Rect
      </div>
      <div class="add-option" onclick="addCircle(); hideAddModal();">
        <span class="icon">&#9679;</span>Circle
      </div>
      <div class="add-option" onclick="addPill(); hideAddModal();">
        <span class="icon" style="font-size:18px">&#9898;</span>Pill
      </div>
      <div class="add-option" onclick="addTriangle(); hideAddModal();">
        <span class="icon">&#9650;</span>Triangle
      </div>
      <div class="add-option" onclick="addArrow(); hideAddModal();">
        <span class="icon">&#10148;</span>Arrow
      </div>
      <div class="add-option" onclick="addBannerCombo(); hideAddModal();">
        <span class="icon" style="font-size:18px">&#127988;</span>Banner
      </div>
      <div class="add-option" onclick="addAngledBanner(); hideAddModal();">
        <span class="icon" style="font-size:16px">&#11153;</span>Angled Banner
      </div>
      <div class="add-option" onclick="addChevron(); hideAddModal();">
        <span class="icon">&#10095;</span>Chevron
      </div>
      <div class="add-option" onclick="addDiamond(); hideAddModal();">
        <span class="icon">&#9670;</span>Diamond
      </div>
      <div class="add-option" onclick="addFrame(); hideAddModal();">
        <span class="icon" style="font-size:18px">&#9634;</span>Frame
      </div>
      <div class="add-option" onclick="addImageFromFile(); hideAddModal();">
        <span class="icon">&#128247;</span>Image
      </div>
    </div>
    <div class="actions" style="margin-top:16px">
      <button class="btn-cancel" onclick="hideAddModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="image-input" accept="image/*" style="display:none">
<input type="file" id="json-input" accept=".json" multiple style="display:none">
<input type="file" id="pattern-input" accept=".json" style="display:none">

<!-- Context Menu -->
<div id="context-menu"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<script>
// --- Font List ---
const FONTS = ['Jost','Arial','Helvetica','Georgia','Times New Roman','Courier New','Verdana','Impact','Trebuchet MS','Palatino','Garamond','Oswald','Montserrat','Roboto','Poppins','Lato','Open Sans','Raleway','Playfair Display','Bebas Neue'];

// --- Brand Palette ---
// The Looth Group, refreshed brand colors. Grouped: Core → Neutrals → Extended.
const BRAND = [
  // Core brand colors (lifted from the logo — these are the identity)
  { name: 'Forest',       hex: '#416943' },
  { name: 'Looth Orange', hex: '#FE9336' },
  { name: 'Ringed Gold',  hex: '#FDC649' },
  { name: 'Deep Forest',  hex: '#2F4D2E' },
  { name: 'Sage',         hex: '#A1C499' },
  { name: 'Burnt Orange', hex: '#E4591E' },
  // Neutrals (warm-leaning)
  { name: 'Paper',        hex: '#FAF7F0' },
  { name: 'Linen',        hex: '#E8E4D6' },
  { name: 'Stone',        hex: '#B8B2A0' },
  { name: 'Ash',          hex: '#6B6757' },
  { name: 'Graphite',     hex: '#3A3830' },
  { name: 'Coffee',       hex: '#1C1B16' },
  // Extended palette (complementary tones)
  { name: 'Rosewood',     hex: '#7A3A1F' },
  { name: 'Copper',       hex: '#B87333' },
  { name: 'Brass',        hex: '#D9A441' },
  { name: 'Meadow',       hex: '#5E8C54' },
  { name: 'Pine',         hex: '#1F3A2A' },
  { name: 'Rust Red',     hex: '#8B1E1E' },
  { name: 'Slate Teal',   hex: '#4A6B7A' },
  { name: 'Wheat',        hex: '#C9B37A' },
];

// Build a color picker widget: native picker + hex input + brand swatches
// prop: the fabric property to set (e.g. 'fill')
// currentVal: current hex color
// Returns HTML string
function brandColorPicker(prop, currentVal) {
  const hex6 = toHex6(currentVal || '#000000');
  const uid = 'cp_' + prop + '_' + Math.random().toString(36).slice(2,8);
  let html = `<div class="color-field">`;
  html += `<input type="color" id="${uid}_native" value="${hex6}" onchange="colorPickerChanged('${prop}', this.value, '${uid}')">`;
  html += `<input type="text" class="hex-input" id="${uid}_hex" value="${hex6}" onchange="colorPickerHexChanged('${prop}', this.value, '${uid}')" spellcheck="false">`;
  html += `</div>`;
  html += `<div class="brand-swatches">`;
  for (const c of BRAND) {
    html += `<div class="brand-swatch" style="background:${c.hex}" title="${c.name} (${c.hex})" onclick="colorPickerChanged('${prop}', '${c.hex}', '${uid}')"></div>`;
  }
  html += `</div>`;
  return html;
}

function colorPickerChanged(prop, val, uid) {
  setObjProp(prop, val);
  const native = document.getElementById(uid + '_native');
  const hexInput = document.getElementById(uid + '_hex');
  if (native) native.value = toHex6(val);
  if (hexInput) hexInput.value = toHex6(val);
}

function colorPickerHexChanged(prop, val, uid) {
  // Normalize: add # if missing
  let hex = val.trim();
  if (!hex.startsWith('#')) hex = '#' + hex;
  // Validate
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    colorPickerChanged(prop, hex, uid);
  } else if (/^#[0-9a-fA-F]{3}$/.test(hex)) {
    const full = '#' + hex[1]+hex[1] + hex[2]+hex[2] + hex[3]+hex[3];
    colorPickerChanged(prop, full, uid);
  }
}

// --- State ---
let canvas;
let zoom = 1;
let snapEnabled = true;
let snapGrid = 10;
let canvasW = 1280, canvasH = 720;
const SNAP_THRESHOLD = 10;
const GUIDE_COLOR = '#ff4488';

// --- Tabs ---
let tabs = []; // { id, name, canvasW, canvasH, canvasJSON }
let activeTabId = null;
let tabIdCounter = 0;

function createTab(name, w, h) {
  const id = ++tabIdCounter;
  tabs.push({ id, name, canvasW: w, canvasH: h, canvasJSON: null });
  return id;
}

function saveCurrentTabState() {
  if (!activeTabId || !canvas) return;
  const tab = tabs.find(t => t.id === activeTabId);
  if (!tab) return;
  clearGuidelines();
  canvas.discardActiveObject();
  canvas.requestRenderAll();
  tab.canvasJSON = canvas.toJSON(['_customName', 'lockUniScaling', 'lockMovementX', 'lockMovementY', 'lockScalingX', 'lockScalingY', 'lockRotation', '_bannerLeftEnd', '_bannerRightEnd', '_bannerNotchL', '_bannerNotchR', '_bannerFlareL', '_bannerFlareR', '_isBannerGroup','_isHitboxGroup','_isFrame','_frameOffset','_framePadT','_framePadR','_framePadB','_framePadL', '_padL', '_padR', '_padT', '_padB', 'paintFirst','_shadowSpread','_spreadStrokeBackup','_frameThickness','_frameRadius','_padLinked','_cornerRadius','_innerShadow','_corners','_cornersLinked']);
  tab.canvasW = canvasW;
  tab.canvasH = canvasH;
}

function switchToTab(id) {
  if (id === activeTabId) return;
  saveCurrentTabState();
  const tab = tabs.find(t => t.id === id);
  if (!tab) return;
  activeTabId = id;
  initCanvas(tab.canvasW, tab.canvasH);
  undoStack = [];
  redoStack = [];
  if (tab.canvasJSON) {
    canvas.loadFromJSON(tab.canvasJSON, function() {
      // Sync canvasBg globals from loaded background
      const bgStr = canvas.backgroundColor || '#2B2318';
      const rgbaM = /^rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)(?:\s*,\s*([\d.]+))?\s*\)$/i.exec(bgStr);
      if (rgbaM) {
        canvasBgColor = '#' + ((1<<24) | (+rgbaM[1]<<16) | (+rgbaM[2]<<8) | +rgbaM[3]).toString(16).slice(1);
        canvasBgAlpha = rgbaM[4] !== undefined ? +rgbaM[4] : 1;
      } else {
        canvasBgColor = bgStr;
        canvasBgAlpha = 1;
      }
      reattachBehaviors();
      refreshLayers();
      saveUndo(); // initial state
    });
  }
  renderTabs();
}

function closeTab(id, evt) {
  if (evt) evt.stopPropagation();
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  tabs.splice(idx, 1);
  if (tabs.length === 0) {
    activeTabId = null;
    initCanvas(1280, 720);
    renderTabs();
    return;
  }
  if (activeTabId === id) {
    const newIdx = Math.min(idx, tabs.length - 1);
    activeTabId = null; // prevent double-save
    switchToTab(tabs[newIdx].id);
  }
  renderTabs();
}

function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  tabs.forEach(tab => {
    const div = document.createElement('div');
    div.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    div.innerHTML = `<span class="tab-name">${tab.name}</span><span class="tab-close" onclick="closeTab(${tab.id}, event)">&times;</span>`;
    div.addEventListener('click', () => switchToTab(tab.id));
    bar.appendChild(div);
  });
  // "+" button to add a new tab
  const addBtn = document.createElement('div');
  addBtn.className = 'tab tab-add';
  addBtn.title = 'New tab';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', addTab);
  bar.appendChild(addBtn);
}

function addTab() {
  saveCurrentTabState();
  const w = canvasW || 1280;
  const h = canvasH || 720;
  const bg = (canvas && canvas.backgroundColor) || '#2B2318';
  const id = Date.now() + Math.floor(Math.random() * 1000);
  const name = 'Untitled ' + (tabs.length + 1);
  // Seed an empty canvas JSON so the new tab loads at the requested size + bg
  const seed = { version: fabric.version, objects: [], background: bg, width: w, height: h };
  tabs.push({ id, name, canvasW: w, canvasH: h, canvasJSON: seed });
  activeTabId = null; // prevent switchToTab from saving into the previous tab again
  switchToTab(id);
}

// --- Init ---
function initCanvas(w, h) {
  canvasW = w;
  canvasH = h;
  if (canvas) canvas.dispose();

  canvas = new fabric.Canvas('c', {
    width: w,
    height: h,
    backgroundColor: '#2B2318',
    preserveObjectStacking: true,
    selection: true,
  });

  canvas.on('object:moving', onObjectMoving);
  canvas.on('object:scaling', onObjectScaling);
  canvas.on('selection:created', onSelectionChanged);
  canvas.on('selection:updated', onSelectionChanged);
  canvas.on('selection:cleared', onSelectionCleared);
  canvas.on('object:modified', (e) => {
    // Bake scale into width/height for rounded rects so corner radius stays
    // visually circular instead of stretching with scaleX/scaleY.
    const o = e && e.target;
    if (o && o.type === 'rect' && (o.rx || o.ry) && !o._isFrame) {
      const newW = Math.max(1, o.width * o.scaleX);
      const newH = Math.max(1, o.height * o.scaleY);
      o.set({ width: newW, height: newH, scaleX: 1, scaleY: 1 });
      o.setCoords();
    }
    saveUndo(); refreshLayers(); updateProps();
  });
  canvas.on('mouse:move', onMouseMove);
  canvas.on('text:changed', () => { saveUndo(); refreshLayers(); });

  document.getElementById('status-size').textContent = `${w} x ${h}`;
  setZoom(1);
  refreshLayers();
}

// --- Snap Guides ---
let guidelines = [];

function clearGuidelines() {
  guidelines.forEach(g => canvas.remove(g));
  guidelines = [];
}

function addGuideline(points, color) {
  const line = new fabric.Line(points, {
    stroke: color || GUIDE_COLOR,
    strokeWidth: 1,
    strokeDashArray: [3, 3],
    selectable: false,
    evented: false,
    excludeFromExport: true,
    _isGuideline: true,
  });
  canvas.add(line);
  guidelines.push(line);
}

// --- Grid snapping ---
// Snap object position (on move) and scaled bounds (on resize) to a fixed grid
// based on the canvas resolution. Simpler and more predictable than edge-detect.
function snapVal(v) {
  const g = Math.max(1, snapGrid || 10);
  return Math.round(v / g) * g;
}

function onObjectMoving(e) {
  if (!snapEnabled) return;
  clearGuidelines();
  const obj = e.target;
  obj.setCoords();
  const b = obj.getBoundingRect(true, true);

  // Center-snap thresholds (in pixels). Slightly larger than grid feel so it
  // grabs reliably when you drag near the centerline.
  const CENTER_SNAP = 8;
  const CENTER_GUIDE_COLOR = '#FE9336'; // Looth Orange — distinct from grid guides

  const objCenterX = b.left + b.width / 2;
  const objCenterY = b.top + b.height / 2;
  const canvasCenterX = canvasW / 2;
  const canvasCenterY = canvasH / 2;

  let dx, dy, centeredX = false, centeredY = false;

  // X-axis: prefer center-snap if close, else grid-snap on bounding-box left
  if (Math.abs(objCenterX - canvasCenterX) < CENTER_SNAP) {
    dx = canvasCenterX - objCenterX;
    centeredX = true;
  } else {
    dx = snapVal(b.left) - b.left;
  }
  // Y-axis: same logic
  if (Math.abs(objCenterY - canvasCenterY) < CENTER_SNAP) {
    dy = canvasCenterY - objCenterY;
    centeredY = true;
  } else {
    dy = snapVal(b.top) - b.top;
  }

  if (dx !== 0) obj.set('left', obj.left + dx);
  if (dy !== 0) obj.set('top', obj.top + dy);
  obj.setCoords();

  const nb = obj.getBoundingRect(true, true);

  // X guides: center line if centered (orange), else left + right edges (grid color)
  if (centeredX) {
    addGuideline([canvasCenterX, 0, canvasCenterX, canvasH], CENTER_GUIDE_COLOR);
  } else {
    addGuideline([nb.left, 0, nb.left, canvasH]);
    addGuideline([nb.left + nb.width, 0, nb.left + nb.width, canvasH]);
  }
  // Y guides: center line if centered, else top + bottom edges
  if (centeredY) {
    addGuideline([0, canvasCenterY, canvasW, canvasCenterY], CENTER_GUIDE_COLOR);
  } else {
    addGuideline([0, nb.top, canvasW, nb.top]);
    addGuideline([0, nb.top + nb.height, canvasW, nb.top + nb.height]);
  }
  updateProps();
}

// ---- Image crop controls ----
// Corners = uniform scale (proportional). Sides = crop (adjust cropX/cropY +
// width/height in source pixels). No single-axis scaling.
function makeImageCropAction(edge) {
  return function(eventData, transform, x, y) {
    const t = transform.target;
    const el = t._element || t._originalElement;
    if (!el) return false;
    const natW = el.naturalWidth || el.width;
    const natH = el.naturalHeight || el.height;
    const localPoint = fabric.util.transformPoint(
      new fabric.Point(x, y),
      fabric.util.invertTransform(t.calcTransformMatrix())
    );
    const w = t.width, h = t.height;
    const cropX = t.cropX || 0, cropY = t.cropY || 0;
    const angle = (t.angle || 0) * Math.PI / 180;
    const cos = Math.cos(angle), sin = Math.sin(angle);
    const MIN = 10;
    if (edge === 'mr') {
      const newW = Math.max(MIN, Math.min(natW - cropX, localPoint.x + w / 2));
      t.set({ width: newW });
    } else if (edge === 'ml') {
      const newW = Math.max(MIN, Math.min(natW, w / 2 - localPoint.x));
      const delta = w - newW;
      const newCropX = Math.max(0, Math.min(natW - newW, cropX + delta));
      t.left += delta * t.scaleX * cos;
      t.top += delta * t.scaleX * sin;
      t.set({ width: newW, cropX: newCropX });
    } else if (edge === 'mb') {
      const newH = Math.max(MIN, Math.min(natH - cropY, localPoint.y + h / 2));
      t.set({ height: newH });
    } else if (edge === 'mt') {
      const newH = Math.max(MIN, Math.min(natH, h / 2 - localPoint.y));
      const delta = h - newH;
      const newCropY = Math.max(0, Math.min(natH - newH, cropY + delta));
      t.left += -delta * t.scaleY * sin;
      t.top += delta * t.scaleY * cos;
      t.set({ height: newH, cropY: newCropY });
    }
    t.setCoords();
    // Keep corner-radius clipPath sized to new crop bounds
    if (t._cornerRadius && t._cornerRadius > 0) {
      setImageCornerRadiusOn(t, t._cornerRadius);
    }
    return true;
  };
}

function setImageCornerRadiusOn(img, r) {
  r = Math.max(0, +r || 0);
  img._cornerRadius = r;
  if (r <= 0) { img.clipPath = null; return; }
  const w = img.width, h = img.height;
  const rr = Math.min(r, w / 2, h / 2);
  img.clipPath = new fabric.Rect({
    left: -w / 2, top: -h / 2,
    width: w, height: h,
    rx: rr, ry: rr,
    originX: 'left', originY: 'top',
    absolutePositioned: false,
  });
  img.dirty = true;
}

function setImageCornerRadius(r) {
  const img = canvas.getActiveObject();
  if (!img || img.type !== 'image') return;
  r = Math.max(0, +r || 0);
  img._cornerRadius = r;
  if (r <= 0) {
    img.clipPath = null;
  } else {
    const w = img.width, h = img.height;
    const rr = Math.min(r, w / 2, h / 2);
    img.clipPath = new fabric.Rect({
      left: -w / 2, top: -h / 2,
      width: w, height: h,
      rx: rr, ry: rr,
      originX: 'left', originY: 'top',
      absolutePositioned: false,
    });
  }
  img.dirty = true;
  canvas.requestRenderAll();
  saveUndo();
}

// --- Image filters (Fabric.Image.filters.*) ---
// Sliders: Blur / Brightness / Contrast / Saturation. Toggles: Grayscale / Sepia / Invert.
// Stored on image.filters array, serialized automatically into saved JSON.

function _getActiveImage() {
  const img = canvas.getActiveObject();
  return (img && img.type === 'image') ? img : null;
}

function setImageFilter(type, key, value) {
  const img = _getActiveImage();
  if (!img) return;
  const FilterClass = fabric.Image.filters[type];
  if (!FilterClass) return;
  if (!img.filters) img.filters = [];
  let f = img.filters.find(x => x.type === type);
  if (Math.abs(+value) < 1e-6) {
    // Effectively zero — remove the filter entry for a cleaner saved JSON
    if (f) img.filters = img.filters.filter(x => x !== f);
  } else if (f) {
    f[key] = +value;
  } else {
    const opts = {}; opts[key] = +value;
    img.filters.push(new FilterClass(opts));
  }
  img.applyFilters();
  canvas.requestRenderAll();
  saveUndo();
}

function toggleImageFilter(type, enabled) {
  const img = _getActiveImage();
  if (!img) return;
  const FilterClass = fabric.Image.filters[type];
  if (!FilterClass) return;
  if (!img.filters) img.filters = [];
  const existing = img.filters.find(x => x.type === type);
  if (enabled && !existing) img.filters.push(new FilterClass());
  else if (!enabled && existing) img.filters = img.filters.filter(x => x !== existing);
  img.applyFilters();
  canvas.requestRenderAll();
  saveUndo();
}

function clearImageFilters() {
  const img = _getActiveImage();
  if (!img) return;
  img.filters = [];
  img.applyFilters();
  canvas.requestRenderAll();
  updateProps();
  saveUndo();
}

function setupImageControls(img) {
  // Uniform (proportional) scaling on corners
  img.lockUniScaling = true;
  img.centeredScaling = false;
  // Clone default controls so we keep corners + rotation
  img.controls = Object.assign({}, fabric.Object.prototype.controls);
  const mk = (xRel, yRel, edge, cursor) => new fabric.Control({
    x: xRel, y: yRel,
    offsetX: 0, offsetY: 0,
    actionName: 'crop',
    cursorStyle: cursor,
    actionHandler: makeImageCropAction(edge),
    render: fabric.controlsUtils.renderSquareControl || function(ctx, left, top, styleOverride, fabricObject) {
      const size = 10;
      ctx.save();
      ctx.fillStyle = '#3b82f6';
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.fillRect(left - size/2, top - size/2, size, size);
      ctx.strokeRect(left - size/2, top - size/2, size, size);
      ctx.restore();
    },
  });
  img.controls.ml = mk(-0.5, 0, 'ml', 'ew-resize');
  img.controls.mr = mk(0.5, 0, 'mr', 'ew-resize');
  img.controls.mt = mk(0, -0.5, 'mt', 'ns-resize');
  img.controls.mb = mk(0, 0.5, 'mb', 'ns-resize');
}

function onObjectScaling(e) {
  if (!snapEnabled) { clearGuidelines(); updateProps(); return; }
  clearGuidelines();
  const obj = e.target;
  obj.setCoords();
  const b = obj.getBoundingRect(true, true);
  // Snap the edge being dragged to the grid. Which corner/edge is active
  // is in e.transform.corner (e.g. 'tl', 'br', 'mr', 'mb', ...).
  const corner = (e.transform && e.transform.corner) || '';
  const left = b.left, top = b.top, right = b.left + b.width, bottom = b.top + b.height;
  let newL = left, newT = top, newR = right, newB = bottom;
  if (corner.includes('l')) newL = snapVal(left);
  if (corner.includes('r')) newR = snapVal(right);
  if (corner.includes('t')) newT = snapVal(top);
  if (corner.includes('b')) newB = snapVal(bottom);
  const newW = Math.max(1, newR - newL);
  const newH = Math.max(1, newB - newT);
  // Apply by adjusting scaleX/scaleY and left/top so the snapped edges line up.
  // Use the ratio of new bounds to current bounds to scale the existing scale.
  const sxMul = newW / b.width;
  const syMul = newH / b.height;
  obj.set({
    scaleX: obj.scaleX * sxMul,
    scaleY: obj.scaleY * syMul,
    left: obj.left + (newL - left),
    top: obj.top + (newT - top),
  });
  obj.setCoords();
  // Guides on the snapped edges
  if (corner.includes('l')) addGuideline([newL, 0, newL, canvasH]);
  if (corner.includes('r')) addGuideline([newR, 0, newR, canvasH]);
  if (corner.includes('t')) addGuideline([0, newT, canvasW, newT]);
  if (corner.includes('b')) addGuideline([0, newB, canvasW, newB]);
  updateProps();
}

// --- Layers ---
const expandedGroups = new Set(); // track which groups are expanded by object ref id

// Canvas background pseudo-layer state
let canvasBgSelected = false;
let canvasBgColor = '#2B2318';
let canvasBgAlpha = 1;

function getColorAlpha(c) {
  if (!c) return 1;
  const m = /rgba?\(\s*\d+\s*,\s*\d+\s*,\s*\d+(?:\s*,\s*([\d.]+))?\s*\)/i.exec(c);
  if (m) return m[1] !== undefined ? +m[1] : 1;
  return 1;
}
function getColorHex(c) {
  if (!c) return '#000000';
  const m = /rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i.exec(c);
  if (m) return '#' + ((1<<24) | (+m[1]<<16) | (+m[2]<<8) | +m[3]).toString(16).slice(1);
  return c;
}
function colorWithAlpha(c, a) {
  const hex = getColorHex(c);
  return a >= 1 ? hex : hexToRgba(hex, a);
}
function strokeOpacityRow(prop, alpha) {
  return alphaRow('BOpa', prop, alpha);
}
function alphaRow(label, prop, alpha) {
  const pct = Math.round((alpha === undefined ? 1 : alpha) * 100);
  return `<div class="prop-row"><label>${label}</label>` +
    `<input type="range" min="0" max="100" value="${pct}" oninput="setObjProp('${prop}', +this.value/100)">` +
    `<input type="number" min="0" max="100" value="${pct}" style="width:42px;flex:none" onchange="setObjProp('${prop}', +this.value/100)">` +
    '<span style="font-size:11px;color:#666">%</span></div>';
}
function hexToRgba(hex, a) {
  const m = /^#?([0-9a-fA-F]{6})$/.exec(hex || '');
  if (!m) return hex;
  const n = parseInt(m[1], 16);
  return 'rgba(' + ((n>>16)&255) + ',' + ((n>>8)&255) + ',' + (n&255) + ',' + a + ')';
}
function applyCanvasBg() {
  canvas.backgroundColor = canvasBgAlpha >= 1 ? canvasBgColor : hexToRgba(canvasBgColor, canvasBgAlpha);
  canvas.requestRenderAll();
}
function selectCanvasBg() {
  canvasBgSelected = true;
  canvas.discardActiveObject();
  canvas.requestRenderAll();
  refreshLayers();
  updateProps();
}

function getLayerIcon(obj) {
  if (obj.type === 'textbox' || obj.type === 'i-text' || obj.type === 'text') return 'T';
  if (obj.type === 'image') return '\u{1F5BC}';
  if (obj.type === 'rect') return '\u25A0';
  if (obj.type === 'circle') return '\u25CF';
  if (obj.type === 'triangle') return '\u25B2';
  if (obj.type === 'polygon') return '\u2B23';
  if (obj.type === 'rect' && obj._isFrame) return '\u{1F5BC}';
  if (obj.type === 'group' && obj._isBannerGroup) return '\u{1F3F7}';
  if (obj.type === 'group' && obj._isHitboxGroup) return '\u{1F517}';
  if (obj.type === 'group') return '\u{1F4C1}';
  return '?';
}

function getLayerName(obj) {
  if (obj._customName) return obj._customName;
  if (obj.type === 'textbox' || obj.type === 'i-text' || obj.type === 'text') return obj.text?.substring(0, 20) || 'Text';
  if (obj.type === 'image') return 'Image';
  if (obj.type === 'rect') return 'Rectangle';
  if (obj.type === 'circle') return 'Circle';
  if (obj.type === 'triangle') return 'Triangle';
  if (obj.type === 'polygon') return 'Polygon';
  if (obj.type === 'group') return 'Group (' + (obj._objects ? obj._objects.length : 0) + ')';
  return obj.type || 'Object';
}

function layerClickHandler(obj, evt) {
  if (evt.ctrlKey || evt.shiftKey) {
    const active = canvas.getActiveObject();
    if (!active) {
      canvas.setActiveObject(obj);
    } else if (active.type === 'activeSelection') {
      if (active.contains(obj)) {
        active.removeWithUpdate(obj);
        if (active._objects.length === 1) {
          canvas.setActiveObject(active._objects[0]);
        } else if (active._objects.length === 0) {
          canvas.discardActiveObject();
        }
      } else {
        active.addWithUpdate(obj);
      }
    } else if (active === obj) {
      canvas.discardActiveObject();
    } else {
      const sel = new fabric.ActiveSelection([active, obj], { canvas: canvas });
      canvas.setActiveObject(sel);
    }
  } else {
    canvas.setActiveObject(obj);
  }
  canvas.requestRenderAll();
  refreshLayers();
  updateProps();
}

function buildLayerRow(obj, idx, active, isChild, groupObj, childIdx) {
  const div = document.createElement('div');
  // For group children, highlight if the parent group is selected
  const isSelected = isChild
    ? (groupObj === active)
    : (obj === active || (active && active.type === 'activeSelection' && active.contains && active.contains(obj)));
  let cls = 'layer-item' + (isSelected ? ' selected' : '') + (obj.visible === false ? ' hidden-layer' : '');
  if (isChild) cls += ' group-child';
  div.className = cls;
  div.dataset.index = idx;

  const icon = getLayerIcon(obj);
  const name = getLayerName(obj);

  let expandBtn = '';
  if (obj.type === 'group' && obj._objects && obj._objects.length > 0) {
    const gid = obj.__uid || (obj.__uid = Math.random().toString(36).slice(2));
    const isExpanded = expandedGroups.has(gid);
    expandBtn = `<span class="expand-toggle" data-gid="${gid}">${isExpanded ? '▼' : '►'}</span>`;
  }

  // For group children, add reorder buttons inline
  let childActions = '';
  if (isChild && groupObj && groupObj._objects) {
    const total = groupObj._objects.length;
    childActions = `<button onclick="moveGroupChild(${childIdx},'up'); event.stopPropagation();" title="Move Up" ${childIdx >= total - 1 ? 'disabled' : ''} style="font-size:9px;padding:1px 3px;background:#333;border:1px solid #444;color:#aaa;cursor:pointer;border-radius:2px;">▲</button>` +
      `<button onclick="moveGroupChild(${childIdx},'down'); event.stopPropagation();" title="Move Down" ${childIdx <= 0 ? 'disabled' : ''} style="font-size:9px;padding:1px 3px;background:#333;border:1px solid #444;color:#aaa;cursor:pointer;border-radius:2px;">▼</button>`;
  }

  div.innerHTML = `
    ${expandBtn}
    <span class="layer-icon">${icon}</span>
    <span class="layer-name">${name}</span>
    <span class="layer-actions">
      ${childActions}
      <button onclick="toggleVisibility(${isChild ? -1 : idx}); event.stopPropagation();" title="Toggle visibility">${obj.visible !== false ? '\u{1F441}' : '\u{1F441}\u200D\u{1F5E8}'}</button>
      <button onclick="toggleLock(${isChild ? -1 : idx}); event.stopPropagation();" title="Toggle lock" class="${obj.lockMovementX ? 'active' : ''}">\u{1F512}</button>
    </span>
  `;

  // Expand/collapse toggle for groups
  const toggle = div.querySelector('.expand-toggle');
  if (toggle) {
    toggle.addEventListener('click', (evt) => {
      evt.stopPropagation();
      const gid = toggle.dataset.gid;
      if (expandedGroups.has(gid)) expandedGroups.delete(gid);
      else expandedGroups.add(gid);
      refreshLayers();
    });
  }

  // For group children, clicking selects the parent group
  if (isChild && groupObj) {
    div.addEventListener('click', (evt) => {
      canvas.setActiveObject(groupObj);
      canvas.requestRenderAll();
      refreshLayers();
      updateProps();
    });
  } else {
    div.addEventListener('click', (evt) => layerClickHandler(obj, evt));
  }
  return div;
}

function refreshLayers() {
  const panel = document.getElementById('layers-panel');
  const objects = canvas.getObjects().filter(o => !o._isGuideline);
  const active = canvas.getActiveObject();

  panel.innerHTML = '';
  // Render top-to-bottom (highest layer first)
  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    panel.appendChild(buildLayerRow(obj, i, active, false));

    // If it's an expanded group, render children
    if (obj.type === 'group' && obj._objects) {
      const gid = obj.__uid || (obj.__uid = Math.random().toString(36).slice(2));
      if (expandedGroups.has(gid)) {
        for (let c = obj._objects.length - 1; c >= 0; c--) {
          const child = obj._objects[c];
          const childRow = buildLayerRow(child, i, active, true, obj, c);
          // Override click for group children - select the group itself
          childRow.removeEventListener && childRow.replaceWith(childRow); // noop, just clarity
          panel.appendChild(childRow);
        }
      }
    }
  }

  // Canvas pseudo-layer at bottom
  const cRow = document.createElement('div');
  cRow.className = 'layer-item' + (canvasBgSelected ? ' selected' : '');
  cRow.style.borderTop = '2px solid #333';
  cRow.innerHTML =
    '<span class="layer-icon">\u{1F3A8}</span>' +
    '<span class="layer-name">Canvas</span>';
  cRow.addEventListener('click', selectCanvasBg);
  panel.appendChild(cRow);
}

function toggleVisibility(idx) {
  const obj = canvas.getObjects().filter(o => !o._isGuideline)[idx];
  obj.visible = obj.visible === false ? true : false;
  canvas.requestRenderAll();
  refreshLayers();
}

function toggleLock(idx) {
  const obj = canvas.getObjects().filter(o => !o._isGuideline)[idx];
  const locked = !obj.lockMovementX;
  obj.set({
    lockMovementX: locked,
    lockMovementY: locked,
    lockScalingX: locked,
    lockScalingY: locked,
    lockRotation: locked,
    hasControls: !locked,
    selectable: !locked || true, // still selectable for properties
  });
  canvas.requestRenderAll();
  refreshLayers();
}

function moveLayer(dir) {
  const obj = canvas.getActiveObject();
  if (!obj) return;
  const objects = canvas.getObjects().filter(o => !o._isGuideline);
  const idx = objects.indexOf(obj);
  if (dir === 'up' && idx < objects.length - 1) {
    obj.moveTo(idx + 1);
  } else if (dir === 'down' && idx > 0) {
    obj.moveTo(idx - 1);
  }
  canvas.requestRenderAll();
  refreshLayers();
}

function duplicateLayer() {
  const obj = canvas.getActiveObject();
  if (!obj) return;
  obj.clone(function(cloned) {
    cloned.set({ left: obj.left + 20, top: obj.top + 20, _customName: (obj._customName || '') + ' copy' });
    // Preserve banner group properties
    if (obj._isBannerGroup) {
      cloned._isBannerGroup = true;
      cloned._padL = obj._padL; cloned._padR = obj._padR;
      cloned._padT = obj._padT; cloned._padB = obj._padB;
      cloned._bannerLeftEnd = obj._bannerLeftEnd;
      cloned._bannerRightEnd = obj._bannerRightEnd;
      cloned._bannerNotchL = obj._bannerNotchL;
      cloned._bannerNotchR = obj._bannerNotchR;
    }
    // Preserve hitbox group properties
    if (obj._isHitboxGroup) {
      cloned._isHitboxGroup = true;
      cloned._padL = obj._padL; cloned._padR = obj._padR;
      cloned._padT = obj._padT; cloned._padB = obj._padB;
    }
    canvas.add(cloned);
    canvas.setActiveObject(cloned);
    canvas.requestRenderAll();
    refreshLayers();
    saveUndo();
  });
}

function deleteLayer() {
  const obj = canvas.getActiveObject();
  if (!obj) return;
  canvas.remove(obj);
  canvas.discardActiveObject();
  canvas.requestRenderAll();
  refreshLayers();
  updateProps();
  saveUndo();
}

// --- Group / Ungroup ---
function groupSelected() {
  const active = canvas.getActiveObject();
  if (!active || active.type !== 'activeSelection') return; // need multi-select
  const group = active.toGroup();
  group._customName = 'Group';
  canvas.requestRenderAll();
  refreshLayers();
  updateProps();
  saveUndo();
}

function ungroupSelected() {
  const active = canvas.getActiveObject();
  if (!active || active.type !== 'group') return;
  const items = active.toActiveSelection();
  canvas.requestRenderAll();
  refreshLayers();
  updateProps();
  saveUndo();
}

function moveGroupChild(childIdx, dir) {
  const group = canvas.getActiveObject();
  if (!group || group.type !== 'group' || !group._objects) return;
  const children = group._objects;
  const swapIdx = dir === 'up' ? childIdx + 1 : childIdx - 1;
  if (swapIdx < 0 || swapIdx >= children.length) return;
  // Swap the two children
  const tmp = children[childIdx];
  children[childIdx] = children[swapIdx];
  children[swapIdx] = tmp;
  group.dirty = true;
  canvas.requestRenderAll();
  refreshLayers();
  updateProps();
  saveUndo();
}

function enterGroup() {
  const active = canvas.getActiveObject();
  if (!active || active.type !== 'group') return;
  // Temporarily ungroup so user can select children, then re-group
  const items = active.toActiveSelection();
  canvas.discardActiveObject();
  canvas.requestRenderAll();
  refreshLayers();
  updateProps();
}

// --- Properties Panel ---
function onSelectionChanged() {
  refreshLayers();
  updateProps();
  const obj = canvas.getActiveObject();
  if (obj) {
    document.getElementById('status-selection').textContent = `${obj._customName || obj.type} selected`;
  }
}

function onSelectionCleared() {
  clearGuidelines();
  refreshLayers();
  updateProps();
  document.getElementById('status-selection').textContent = 'No selection';
}

function updateProps() {

      '<div style="font-size:11px;color:#7aa2f7;margin-bottom:6px;font-weight:600;">CANVAS</div>' +
