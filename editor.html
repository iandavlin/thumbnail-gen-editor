        html += `<div class="prop-row"><label>BCol</label>${brandColorPicker('_hbShapeStroke', getColorHex(primary.stroke) || '#FFFFFF')}</div>`;
        html += `<div class="prop-row"><label>BWid</label><input type="number" min="1" max="50" value="${primary.strokeWidth||2}" onchange="setHitboxShapeStrokeWidth(+this.value)"></div>`;
        html += strokeOpacityRow('_hbShapeStrokeAlpha', getColorAlpha(primary.stroke));
      }
      if (hgShapes.length > 1) {
        html += `<div style="font-size:11px;color:#666;margin:4px 0;">Fill/border applies to all ${hgShapes.length} shapes in this group.</div>`;
      }
    }

    // Padding controls (based on group bounding box)
    html += '<div style="font-size:11px;color:#888;margin:8px 0 4px;">Padding (within hitbox)</div>';
    const hpL = obj._padL||0, hpR = obj._padR||0, hpT = obj._padT||0, hpB = obj._padB||0;
    const hbPadLinked = obj._padLinked !== false;
    html += `<div class="prop-row"><label>PL</label><input type="number" min="0" max="500" value="${hpL}" onchange="setBannerGroupPadding('L', +this.value)">`;
    html += `<label>PR</label><input type="number" min="0" max="500" value="${hpR}" onchange="setBannerGroupPadding('R', +this.value)"></div>`;
    html += `<div class="prop-row"><label>PT</label><input type="number" min="0" max="500" value="${hpT}" onchange="setBannerGroupPadding('T', +this.value)">`;
    html += `<button onclick="toggleBannerPadLink()" title="Link padding" style="background:${hbPadLinked ? '#7aa2f7' : '#333'};border:1px solid ${hbPadLinked ? '#7aa2f7' : '#444'};color:${hbPadLinked ? '#111' : '#888'};border-radius:3px;cursor:pointer;padding:2px 6px;font-size:14px;flex-shrink:0">${hbPadLinked ? '\u{1F517}' : '\u{26D3}\uFE0F'}</button>`;
    html += `<label>PB</label><input type="number" min="0" max="500" value="${hpB}" onchange="setBannerGroupPadding('B', +this.value)"></div>`;

    html += `<div class="prop-row" style="margin-top:4px;justify-content:center;">
      <button onclick="ungroupSelected()" style="padding:4px 12px;background:#444;color:#ccc;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;">Ungroup</button>
    </div>`;
  }

  // Group actions (non-banner, non-hitbox groups)
  else if (obj.type === 'group') {
    html += '<hr style="border-color:#333;margin:8px 0">';
    const childCount = obj._objects ? obj._objects.length : 0;
    html += `<div class="prop-row" style="justify-content:center;gap:8px;">
      <span style="font-size:12px;color:#aaa;">${childCount} items</span>
      <button onclick="ungroupSelected()" style="padding:4px 12px;background:#7aa2f7;color:#111;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;">Ungroup</button>
    </div>`;
    // Show children list with reorder buttons
    if (obj._objects && obj._objects.length > 0) {
      const gid = obj.__uid || (obj.__uid = Math.random().toString(36).slice(2));
      if (!expandedGroups.has(gid)) expandedGroups.add(gid); // auto-expand when selected
      html += `<div style="margin-top:6px;font-size:11px;color:#888;">Children (drag to reorder):</div>`;
      for (let ci = obj._objects.length - 1; ci >= 0; ci--) {
        const ch = obj._objects[ci];
        const chName = ch._customName || ch.type || 'Object';
        const chIcon = getLayerIcon(ch);
        html += `<div style="display:flex;align-items:center;gap:4px;padding:2px 0;font-size:12px;">
          <button onclick="moveGroupChild(${ci},'up')" style="background:#333;border:1px solid #444;color:#aaa;cursor:pointer;padding:1px 4px;border-radius:2px;font-size:10px;" ${ci >= obj._objects.length - 1 ? 'disabled' : ''}>▲</button>
          <button onclick="moveGroupChild(${ci},'down')" style="background:#333;border:1px solid #444;color:#aaa;cursor:pointer;padding:1px 4px;border-radius:2px;font-size:10px;" ${ci <= 0 ? 'disabled' : ''}>▼</button>
          <span>${chIcon}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${chName}</span>
        </div>`;
      }
    }
  }
  if (obj.type === 'activeSelection') {
    html += '<hr style="border-color:#333;margin:8px 0">';
    const selCount = obj._objects ? obj._objects.length : 0;
    html += `<div class="prop-row" style="justify-content:center;gap:8px;">
      <span style="font-size:12px;color:#aaa;">${selCount} selected</span>
      <button onclick="groupSelected()" style="padding:4px 12px;background:#7aa2f7;color:#111;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;">Group</button>
    </div>`;
  }

  // Type-specific
  if (obj.type === 'textbox' || obj.type === 'i-text' || obj.type === 'text') {
    html += '<hr style="border-color:#333;margin:8px 0">';
    html += `<div class="prop-row"><label>Text</label><input type="text" value="${(obj.text || '').replace(/"/g, '&quot;')}" onchange="setObjProp('text', this.value)"></div>`;
    const curFontRaw = obj.fontFamily || 'Arial';
    const curFont = curFontRaw.split(',')[0].trim(); // strip CSS fallbacks like ", sans-serif"
    const fonts = FONTS;
    html += `<div class="prop-row"><label>Font</label><select onchange="changeFont(this.value)" style="flex:1">`;
    fonts.forEach(f => { html += `<option value="${f}" ${curFont===f?'selected':''}>${f}</option>`; });
    if (!fonts.includes(curFont)) {
      html += `<option value="${curFont}" selected>${curFont}</option>`;
    }
    html += `</select></div>`;
    html += `<div class="prop-row"><label>Size</label><input type="number" value="${obj.fontSize || 24}" onchange="setObjProp('fontSize', +this.value)"></div>`;
    html += `<div class="prop-row"><label>Col</label>${brandColorPicker('fill', getColorHex(obj.fill) || '#ffffff')}</div>`;
    html += alphaRow('FOpa', '_fillAlpha', getColorAlpha(obj.fill));
    html += `<div class="prop-row"><label>Bold</label><input type="checkbox" ${obj.fontWeight === 'bold' ? 'checked' : ''} onchange="setObjProp('fontWeight', this.checked ? 'bold' : 'normal')">`;
    html += `<label>Algn</label><select onchange="setObjProp('textAlign', this.value)">
      <option value="left" ${obj.textAlign==='left'?'selected':''}>Left</option>
      <option value="center" ${obj.textAlign==='center'?'selected':''}>Center</option>
      <option value="right" ${obj.textAlign==='right'?'selected':''}>Right</option>
    </select></div>`;
    // Text stroke/outline
    const textHasStroke = obj.stroke && obj.strokeWidth > 0;
    html += `<div class="prop-row"><label>Otln</label><input type="checkbox" ${textHasStroke ? 'checked' : ''} onchange="toggleStroke(this.checked)"> <span style="font-size:11px;color:#888">${textHasStroke ? 'On' : 'Off'}</span></div>`;
    if (textHasStroke) {
      html += `<div class="prop-row"><label>OCol</label>${brandColorPicker('stroke', getColorHex(obj.stroke) || '#000000')}</div>`;
      html += `<div class="prop-row"><label>OWid</label><input type="number" min="0.5" max="10" step="0.5" value="${obj.strokeWidth || 1}" onchange="setObjProp('strokeWidth', +this.value)"></div>`;
      html += strokeOpacityRow('_strokeAlpha', getColorAlpha(obj.stroke));
    }
  }

  // Frame — specialized controls (replaces generic rect controls for this element)
  if (obj.type === 'rect' && obj._isFrame) {
    html += '<hr style="border-color:#333;margin:8px 0">';
    html += '<div style="font-size:11px;color:#7aa2f7;margin-bottom:6px;font-weight:600;">FRAME</div>';
    // Migrate legacy _frameOffset to per-edge if not present
    if (obj._framePadT === undefined && obj._frameOffset !== undefined) {
      obj._framePadT = obj._framePadR = obj._framePadB = obj._framePadL = obj._frameOffset;
    }
    const fpT = obj._framePadT || 0;
    const fpR = obj._framePadR || 0;
    const fpB = obj._framePadB || 0;
    const fpL = obj._framePadL || 0;
    const padLinked = obj._padLinked !== false;
    html += '<div style="font-size:11px;color:#888;margin:4px 0;">Padding from canvas edge</div>';
    html += `<div class="prop-row"><label>PT</label><input type="number" min="0" max="2000" value="${fpT}" onchange="setFramePad('T', +this.value)">`;
    html += `<label>PR</label><input type="number" min="0" max="2000" value="${fpR}" onchange="setFramePad('R', +this.value)"></div>`;
    html += `<div class="prop-row"><label>PB</label><input type="number" min="0" max="2000" value="${fpB}" onchange="setFramePad('B', +this.value)">`;
    html += `<button onclick="togglePadLink()" title="Link padding" style="background:${padLinked ? '#7aa2f7' : '#333'};border:1px solid ${padLinked ? '#7aa2f7' : '#444'};color:${padLinked ? '#111' : '#888'};border-radius:3px;cursor:pointer;padding:2px 6px;font-size:14px;flex-shrink:0">${padLinked ? '\u{1F517}' : '\u{26D3}\uFE0F'}</button>`;
    html += `<label>PL</label><input type="number" min="0" max="2000" value="${fpL}" onchange="setFramePad('L', +this.value)"></div>`;
    html += `<div class="prop-row" style="margin:4px 0;justify-content:center;">
      <button onclick="snapFrameToCanvas()" style="padding:4px 10px;background:#7aa2f7;color:#111;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;">Snap to Canvas Edge</button>
    </div>`;
    html += `<div class="prop-row"><label>Thk</label><input type="number" min="0" max="100" step="0.5" value="${obj._frameThickness||0}" onchange="setFrameThickness(+this.value)"></div>`;
    html += `<div class="prop-row"><label>Rad</label><input type="number" min="0" max="500" value="${obj._frameRadius||0}" onchange="setFrameRadius(+this.value)"></div>`;
    // Partial-frame controls. Any deviation from "all on + 100% comp" forces
    // flat corners (radius only applies in the classic full-frame fast path).
    const sT = obj._frameTop !== false, sR = obj._frameRight !== false;
    const sB = obj._frameBottom !== false, sL = obj._frameLeft !== false;
    const cTL = obj._frameTL !== false, cTR = obj._frameTR !== false;
    const cBR = obj._frameBR !== false, cBL = obj._frameBL !== false;
    const comp = obj._frameCompleteness === undefined ? 100 : obj._frameCompleteness;
    const pillBtn = (on, fn, arg, label) =>
      `<button onclick="${fn}('${arg}')" style="flex:1;padding:4px 0;background:${on?'#7aa2f7':'#333'};color:${on?'#111':'#888'};border:1px solid ${on?'#7aa2f7':'#444'};border-radius:3px;cursor:pointer;font-size:11px;font-weight:600;">${label}</button>`;
    html += `<div style="font-size:11px;color:#888;margin:4px 0 2px;">Sides</div>`;
    html += `<div class="prop-row" style="gap:4px;">${pillBtn(sT,'toggleFrameSide','T','Top')}${pillBtn(sR,'toggleFrameSide','R','Right')}${pillBtn(sB,'toggleFrameSide','B','Bottom')}${pillBtn(sL,'toggleFrameSide','L','Left')}</div>`;
    html += `<div style="font-size:11px;color:#888;margin:6px 0 2px;">Corners</div>`;
    html += `<div class="prop-row" style="gap:4px;">${pillBtn(cTL,'toggleFrameCorner','TL','TL')}${pillBtn(cTR,'toggleFrameCorner','TR','TR')}${pillBtn(cBR,'toggleFrameCorner','BR','BR')}${pillBtn(cBL,'toggleFrameCorner','BL','BL')}</div>`;
    html += `<div class="prop-row"><label>Len</label>` +
      `<input type="range" min="0" max="100" value="${comp}" oninput="setFrameCompleteness(+this.value)">` +
      `<input type="number" min="0" max="100" value="${comp}" style="width:48px;flex:none" onchange="setFrameCompleteness(+this.value)">` +
      `<span style="font-size:11px;color:#666">%</span></div>`;
    html += `<div class="prop-row"><label>Col</label>${brandColorPicker('stroke', getColorHex(obj.stroke) || '#87986A')}</div>`;
    html += strokeOpacityRow('_strokeAlpha', getColorAlpha(obj.stroke));
    html += `<div class="prop-row"><label>Fill</label>${brandColorPicker('fill', getColorHex(obj.fill) || '#000000')}</div>`;
    html += alphaRow('FOpa', '_fillAlpha', getColorAlpha(obj.fill));
    html += `<div style="font-size:11px;color:#666;margin:4px 0;">Frame follows canvas edges — use padding fields, not X/Y/W/H above.</div>`;
  }
  else if (obj.type === 'image') {
    html += '<hr style="border-color:#333;margin:8px 0">';
    html += `<div class="prop-row"><label>Rad</label><input type="number" min="0" max="2000" value="${obj._cornerRadius || 0}" onchange="setImageCornerRadius(+this.value)"></div>`;
    // Filters
    const getF = (t) => (obj.filters || []).find(f => f.type === t);
    const blur   = (getF('Blur')       || {}).blur        ?? 0;
    const brit   = (getF('Brightness') || {}).brightness  ?? 0;
    const con    = (getF('Contrast')   || {}).contrast    ?? 0;
    const sat    = (getF('Saturation') || {}).saturation  ?? 0;
    const gray   = !!getF('Grayscale');
    const sepia  = !!getF('Sepia');
    const invert = !!getF('Invert');
    html += '<div style="font-size:11px;color:#888;margin:8px 0 2px;">Filters</div>';
    html += `<div class="prop-row"><label>Blur</label><input type="range" min="0" max="1" step="0.01" value="${blur}" oninput="setImageFilter('Blur','blur',+this.value)"><input type="number" min="0" max="1" step="0.01" value="${blur}" onchange="setImageFilter('Blur','blur',+this.value)" style="width:50px"></div>`;
    html += `<div class="prop-row"><label>Brit</label><input type="range" min="-1" max="1" step="0.01" value="${brit}" oninput="setImageFilter('Brightness','brightness',+this.value)"><input type="number" min="-1" max="1" step="0.01" value="${brit}" onchange="setImageFilter('Brightness','brightness',+this.value)" style="width:50px"></div>`;
    html += `<div class="prop-row"><label>Con</label><input type="range" min="-1" max="1" step="0.01" value="${con}" oninput="setImageFilter('Contrast','contrast',+this.value)"><input type="number" min="-1" max="1" step="0.01" value="${con}" onchange="setImageFilter('Contrast','contrast',+this.value)" style="width:50px"></div>`;
    html += `<div class="prop-row"><label>Sat</label><input type="range" min="-1" max="1" step="0.01" value="${sat}" oninput="setImageFilter('Saturation','saturation',+this.value)"><input type="number" min="-1" max="1" step="0.01" value="${sat}" onchange="setImageFilter('Saturation','saturation',+this.value)" style="width:50px"></div>`;
    html += `<div class="prop-row" style="gap:12px"><label><input type="checkbox" ${gray?'checked':''} onchange="toggleImageFilter('Grayscale', this.checked)"> Gray</label><label><input type="checkbox" ${sepia?'checked':''} onchange="toggleImageFilter('Sepia', this.checked)"> Sepia</label><label><input type="checkbox" ${invert?'checked':''} onchange="toggleImageFilter('Invert', this.checked)"> Inv</label></div>`;
    html += `<div class="prop-row"><button onclick="clearImageFilters()" style="flex:1">Clear filters</button></div>`;
  }
  else if (obj.type === 'rect' || obj.type === 'circle' || obj.type === 'triangle' || obj.type === 'polygon') {
    html += '<hr style="border-color:#333;margin:8px 0">';
    html += `<div class="prop-row"><label>Fill</label>${brandColorPicker('fill', getColorHex(obj.fill) || '#333333')}</div>`;
    html += alphaRow('FOpa', '_fillAlpha', getColorAlpha(obj.fill));
    if (obj.type === 'rect') {
      const c = obj._corners || { tl: obj.rx || 0, tr: obj.rx || 0, br: obj.rx || 0, bl: obj.rx || 0 };
      const linked = obj._cornersLinked !== false; // default linked
      const lockBtn = `<button type="button" onclick="toggleRectCornersLink()" title="${linked ? 'Linked — all corners equal' : 'Independent corners'}" style="margin-left:6px;padding:2px 6px;background:${linked ? '#C8A868' : '#333'};color:${linked ? '#000' : '#ccc'};border:1px solid #555;border-radius:3px;cursor:pointer">${linked ? '🔗' : '🔓'}</button>`;
      html += `<div class="prop-row"><label>TL</label><input type="number" min="0" value="${c.tl}" onchange="setRectCorner('tl', +this.value)" style="width:55px"><label>TR</label><input type="number" min="0" value="${c.tr}" onchange="setRectCorner('tr', +this.value)" style="width:55px">${lockBtn}</div>`;
      html += `<div class="prop-row"><label>BL</label><input type="number" min="0" value="${c.bl}" onchange="setRectCorner('bl', +this.value)" style="width:55px"><label>BR</label><input type="number" min="0" value="${c.br}" onchange="setRectCorner('br', +this.value)" style="width:55px"></div>`;
    }
    // Banner shape controls (for polygons with _bannerLeftEnd or any polygon)
    if (obj.type === 'polygon') {
      const lEnd = obj._bannerLeftEnd || 'flat';
      const rEnd = obj._bannerRightEnd || 'flat';
      const nL = Math.round(obj._bannerNotchL || 20);
      const nR = Math.round(obj._bannerNotchR || 20);
      html += `<div class="prop-row"><label>L End</label><select onchange="setBannerEnd('left', this.value)">
        <option value="flat" ${lEnd==='flat'?'selected':''}>Flat</option>
        <option value="point" ${lEnd==='point'?'selected':''}>Point</option>
        <option value="arrow" ${lEnd==='arrow'?'selected':''}>Arrow</option>
        <option value="chevron" ${lEnd==='chevron'?'selected':''}>Chevron</option>
        <option value="round" ${lEnd==='round'?'selected':''}>Round</option>
        <option value="ribbon" ${lEnd==='ribbon'?'selected':''}>Ribbon</option>
        <option value="slant-l" ${lEnd==='slant-l'?'selected':''}>Slant \u2572</option>
        <option value="slant-r" ${lEnd==='slant-r'?'selected':''}>Slant \u2571</option>
        <option value="scallop" ${lEnd==='scallop'?'selected':''}>Scallop</option>
        <option value="tab" ${lEnd==='tab'?'selected':''}>Tab</option>
      </select></div>`;
      html += `<div class="prop-row"><label>R End</label><select onchange="setBannerEnd('right', this.value)">
        <option value="flat" ${rEnd==='flat'?'selected':''}>Flat</option>
        <option value="point" ${rEnd==='point'?'selected':''}>Point</option>
        <option value="arrow" ${rEnd==='arrow'?'selected':''}>Arrow</option>
        <option value="chevron" ${rEnd==='chevron'?'selected':''}>Chevron</option>
        <option value="round" ${rEnd==='round'?'selected':''}>Round</option>
        <option value="ribbon" ${rEnd==='ribbon'?'selected':''}>Ribbon</option>
        <option value="slant-l" ${rEnd==='slant-l'?'selected':''}>Slant \u2572</option>
        <option value="slant-r" ${rEnd==='slant-r'?'selected':''}>Slant \u2571</option>
        <option value="scallop" ${rEnd==='scallop'?'selected':''}>Scallop</option>
        <option value="tab" ${rEnd==='tab'?'selected':''}>Tab</option>
      </select></div>`;
      html += `<div class="prop-row"><label>NL</label><input type="number" min="0" max="200" value="${nL}" onchange="setBannerNotch('left', +this.value)">`;
      html += `<label>NR</label><input type="number" min="0" max="200" value="${nR}" onchange="setBannerNotch('right', +this.value)"></div>`;
    }
    // Border / Stroke
    const hasStroke = obj.stroke && obj.strokeWidth > 0;
    html += `<div class="prop-row"><label>Bdr</label><input type="checkbox" ${hasStroke ? 'checked' : ''} onchange="toggleStroke(this.checked)"> <span style="font-size:11px;color:#888">${hasStroke ? 'On' : 'Off'}</span></div>`;
    if (hasStroke) {
      html += `<div class="prop-row"><label>BCol</label>${brandColorPicker('stroke', getColorHex(obj.stroke) || '#FFFFFF')}</div>`;
      html += `<div class="prop-row"><label>BWid</label><input type="number" min="1" max="50" value="${obj.strokeWidth || 2}" onchange="setObjProp('strokeWidth', +this.value)"></div>`;
      html += strokeOpacityRow('_strokeAlpha', getColorAlpha(obj.stroke));
    }
    // One-shot: add a centered text on top and auto-link (banner group if polygon, hitbox otherwise)
    html += `<div class="prop-row" style="margin-top:8px;justify-content:center;">
      <button onclick="addTextAndLinkToShape()" style="padding:4px 12px;background:#7aa2f7;color:#111;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;">+ Link Text</button>
    </div>`;
  }

  // --- Shadow (all element types) ---
  html += '<hr style="border-color:#333;margin:8px 0">';
  const sh = obj.shadow || obj._savedShadow;
  // "Has shadow" = any shadow object exists. Don't gate on offsetX/Y/blur being
  // nonzero — shadows with only a color (or intentionally 0/0/0 while being
  // edited) must still be toggleable and editable from the panel.
  const hasShadow = !!sh;
  const shColor = (sh && sh.color) ? sh.color : '#000000';
  const shX = (sh && sh.offsetX) || 0;
  const shY = (sh && sh.offsetY) || 0;
  const shBlur = (sh && sh.blur) || 6;

  html += `<div class="prop-row shadow-toggle"><label>Shad</label><input type="checkbox" ${hasShadow ? 'checked' : ''} onchange="toggleShadow(this.checked)"> <span style="font-size:11px;color:#888">${hasShadow ? 'On' : 'Off'}</span></div>`;
  if (hasShadow) {
    html += `<div class="shadow-fields">`;
    html += `<div class="prop-row"><label>SX</label><input type="number" value="${shX}" onchange="setShadowProp('offsetX', +this.value)">`;
    html += `<label>SY</label><input type="number" value="${shY}" onchange="setShadowProp('offsetY', +this.value)"></div>`;
    const shSpread = obj._shadowSpread || 0;
    html += `<div class="prop-row"><label>Blur</label><input type="number" min="0" value="${shBlur}" onchange="setShadowProp('blur', +this.value)">`;
    html += `<label>Sprd</label><input type="number" min="0" max="100" value="${shSpread}" onchange="setShadowSpread(+this.value)"></div>`;
    html += `<div class="prop-row"><label>SCol</label>${brandColorPicker('_shadowColor', shColor)}</div>`;
    html += `</div>`;
  }

  // --- Inner Shadow (rect, including frames) ---
  if (obj.type === 'rect') {
    const hasInner = !!obj._innerShadow;
    const is = obj._innerShadow || {};
    html += '<hr style="border-color:#333;margin:8px 0">';
    const linked = !!(is && is._linked);
    html += `<div class="prop-row"><label>InShd</label><input type="checkbox" ${hasInner ? 'checked' : ''} onchange="toggleInnerShadow(this.checked)"> <span style="font-size:11px;color:#888">${hasInner ? 'On' : 'Off'}</span>`;
    if (hasInner) {
      html += ` <button type="button" title="Link all 4 edges" onclick="toggleInnerShadowLink()" style="margin-left:6px;padding:2px 6px;background:${linked ? '#C8A868' : '#333'};color:${linked ? '#000' : '#ccc'};border:1px solid #555;border-radius:3px;cursor:pointer">${linked ? '🔗' : '🔓'}</button>`;
    }
    html += `</div>`;
    if (hasInner) {
      html += `<div class="prop-row"><label>LX</label><input type="number" value="${is.lx||0}" onchange="setInnerShadowProp('lx', +this.value)">`;
      html += `<label>RX</label><input type="number" value="${is.rx||0}" onchange="setInnerShadowProp('rx', +this.value)"></div>`;
      html += `<div class="prop-row"><label>UY</label><input type="number" value="${is.uy||0}" onchange="setInnerShadowProp('uy', +this.value)">`;
      html += `<label>DY</label><input type="number" value="${is.dy||0}" onchange="setInnerShadowProp('dy', +this.value)"></div>`;
      html += `<div class="prop-row"><label>IBlur</label><input type="number" min="0" value="${is.blur||0}" onchange="setInnerShadowProp('blur', +this.value)"></div>`;
      html += `<div class="prop-row"><label>ICol</label><input type="color" value="${(is.color||'#000000').replace(/rgba?\([^)]*\)/,'#000000')}" onchange="setInnerShadowProp('color', this.value)"></div>`;
    }
  }

  container.innerHTML = html;
}

// --- Banner shape editing ---
function rebuildBannerPoints(obj) {
  if (!obj || obj.type !== 'polygon') return;
  const leftEnd = obj._bannerLeftEnd || 'flat';
  const rightEnd = obj._bannerRightEnd || 'flat';
  const nL = obj._bannerNotchL || 20;
  const nR = obj._bannerNotchR || 20;
  // Get current bounding box to determine w/h
  const bounds = obj.getBoundingRect(true);
  const pxW = bounds.width / (obj.scaleX || 1);
  const pxH = bounds.height / (obj.scaleY || 1);

  const pts = [];
  if (leftEnd === 'arrow') {
    pts.push({ x: nL, y: 0 });
  } else {
    pts.push({ x: 0, y: 0 });
  }
  if (rightEnd === 'arrow') {
    pts.push({ x: pxW - nR, y: 0 });
    pts.push({ x: pxW, y: pxH / 2 });
    pts.push({ x: pxW - nR, y: pxH });
  } else if (rightEnd === 'chevron') {
    pts.push({ x: pxW, y: 0 });
    pts.push({ x: pxW - nR, y: pxH / 2 });
    pts.push({ x: pxW, y: pxH });
  } else {
    pts.push({ x: pxW, y: 0 });
    pts.push({ x: pxW, y: pxH });
  }
  if (leftEnd === 'arrow') {
    pts.push({ x: nL, y: pxH });
    pts.push({ x: 0, y: pxH / 2 });
  } else if (leftEnd === 'chevron') {
    pts.push({ x: 0, y: pxH });
    pts.push({ x: nL, y: pxH / 2 });
  } else {
    pts.push({ x: 0, y: pxH });
  }

  // Replace polygon: Fabric.js v5 caches polygon dims, so we must
  // remove old and create new polygon to get proper rendering
  const newPoly = new fabric.Polygon(pts, {
    left: obj.left,
    top: obj.top,
    fill: obj.fill,
    stroke: obj.stroke,
    strokeWidth: obj.strokeWidth,
    opacity: obj.opacity,
    shadow: obj.shadow,
    scaleX: obj.scaleX,
    scaleY: obj.scaleY,
    angle: obj.angle,
    _customName: obj._customName,
    _bannerLeftEnd: leftEnd,
    _bannerRightEnd: rightEnd,
    _bannerNotchL: nL,
    _bannerNotchR: nR,
    selectable: obj.selectable,
    evented: obj.evented,
    lockMovementX: obj.lockMovementX,
    lockMovementY: obj.lockMovementY,
    lockScalingX: obj.lockScalingX,
    lockScalingY: obj.lockScalingY,
    lockRotation: obj.lockRotation,
    hasControls: obj.hasControls,
  });

  const idx = canvas.getObjects().indexOf(obj);
  canvas.remove(obj);
  canvas.insertAt(newPoly, idx);
  canvas.setActiveObject(newPoly);
  canvas.requestRenderAll();
}

function setBannerEnd(side, value) {
  const obj = canvas.getActiveObject();
  if (!obj || obj.type !== 'polygon') return;
  if (side === 'left') obj._bannerLeftEnd = value;
  else obj._bannerRightEnd = value;
  rebuildBannerPoints(obj);
  updateProps();
  saveUndo();
}

function setBannerNotch(side, value) {
  const obj = canvas.getActiveObject();
  if (!obj || obj.type !== 'polygon') return;
  if (side === 'left') obj._bannerNotchL = value;
  else obj._bannerNotchR = value;
  rebuildBannerPoints(obj);
  updateProps();
  saveUndo();
}

function changeFont(fontName) {
  const obj = canvas.getActiveObject();
  if (!obj) return;
  obj.set('fontFamily', fontName);
  obj.dirty = true;
  obj.initDimensions();
  obj.setCoords();
  canvas.requestRenderAll();
  updateProps();
  saveUndo();
}

// --- Banner Group (linked banner + text with padding controls) ---

function addBannerCombo() {
  const w = 300, h = 70;
  const x = canvasW / 2 - w / 2, y = canvasH / 2 - h / 2;
  const leftEnd = 'chevron', rightEnd = 'arrow';
  const nL = 20, nR = 20;
  // Padding is now the BODY-relative breathing room — end inset (chevron/arrow
  // depth) is added automatically by recenterBannerText.
  const padL = 10, padR = 10, padT = 8, padB = 8;

  const pts = buildBannerGroupPoints(w, h, leftEnd, rightEnd, nL, nR, 0);
  const poly = new fabric.Polygon(pts, {
    left: x, top: y, fill: '#2B2318',
    shadow: new fabric.Shadow({color:'rgba(0,0,0,0.4)', offsetX:3, offsetY:3, blur:8}),
  });

  const fontSize = 32;
  const textObj = new fabric.Textbox('Banner Text', {
    left: x + padL, top: y + padT,
    width: 100, // recenterBannerText will set this correctly
    fontSize, fontFamily: 'Jost', fontWeight: 'bold',
    fill: '#ECB351', textAlign: 'center',
  });

  const group = new fabric.Group([poly, textObj], {
    _customName: 'Banner',
    _isBannerGroup: true,
    _padL: padL, _padR: padR, _padT: padT, _padB: padB,
    _bannerLeftEnd: leftEnd, _bannerRightEnd: rightEnd,
    _bannerNotchL: nL, _bannerNotchR: nR,
  });

  canvas.add(group);
  // Sync width/height/text position to the inset+pad model
  recenterBannerText(group, false);
  attachBannerGroupControls(group);
  canvas.setActiveObject(group);
  canvas.requestRenderAll();
  refreshLayers();
  updateProps();
  saveUndo();
}

// --- Banner group pull controls ---
// Each arrow end gets two draggable handles:
//   • tip   — horizontal pull, adjusts _bannerNotchL / _bannerNotchR
//   • flare — vertical pull, adjusts _bannerFlareL / _bannerFlareR
// Handles are only rendered when the corresponding end is 'arrow'.
function _bannerHandleVisible(group, side, kind) {
  const end = side === 'left' ? group._bannerLeftEnd : group._bannerRightEnd;
  return end === 'arrow';
}

function _bannerHandleRender(color) {
  return function(ctx, left, top) {
    const size = 9;
    ctx.save();
    ctx.fillStyle = color;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(left, top, size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  };
}

function attachBannerGroupControls(group) {
  if (!group || !group._isBannerGroup) return;
  // Arrow flare and notch live in local polygon coords, so non-uniform scaling
  // distorts the head. Keep only corner handles (proportional) and force uniform
  // scaling so shift+corner can't bypass it either.
  group.controls = Object.assign({}, fabric.Object.prototype.controls);
  delete group.controls.ml;
  delete group.controls.mr;
  delete group.controls.mt;
  delete group.controls.mb;
  group.lockUniScaling = true;

  // Helper: convert a local-space point (relative to group center) to the
  // canvas-space point Fabric expects from positionHandler.
  const localToCanvas = (g, lx, ly) => {
    const pt = fabric.util.transformPoint(
      new fabric.Point(lx, ly),
      g.calcTransformMatrix()
    );
    return pt;
  };

  // Tip handle: sits at the tip of the arrow (x = ±gW/2, y = 0 in local coords).
  // Dragging horizontally changes the notch depth (distance from tip to body).
  const makeTipControl = (side) => new fabric.Control({
    actionName: 'banner-tip-' + side,
    cursorStyle: 'ew-resize',
    render: _bannerHandleRender('#ECB351'),
    positionHandler: function(dim, finalMatrix, fabricObject) {
      const g = fabricObject;
      if (!_bannerHandleVisible(g, side, 'tip')) return new fabric.Point(-9999, -9999);
      const halfW = g.width / 2;
      const lx = side === 'left' ? -halfW : halfW;
      return localToCanvas(g, lx, 0);
    },
    actionHandler: function(eventData, transform, x, y) {
      const g = transform.target;
      // Convert pointer to group-local space
      const local = fabric.util.transformPoint(
        new fabric.Point(x, y),
        fabric.util.invertTransform(g.calcTransformMatrix())
      );
      const halfW = g.width / 2;
      // notch = horizontal distance from tip to body seam. Clamp so the body
      // keeps at least 16px of width after both end insets are subtracted.
      const otherEnd = side === 'left' ? g._bannerRightEnd : g._bannerLeftEnd;
      const otherN = side === 'left' ? (g._bannerNotchR || 20) : (g._bannerNotchL || 20);
      const bodyH = g._bannerBodyH || g.height || 40;
      const otherInset = bannerEndInset(otherEnd, otherN, bodyH);
      const maxN = Math.max(8, g.width - otherInset - 16);
      let raw;
      if (side === 'left') raw = local.x - (-halfW);
      else raw = halfW - local.x;
      const n = Math.max(4, Math.min(maxN, raw));
      if (side === 'left') g._bannerNotchL = n;
      else g._bannerNotchR = n;
      rebuildBannerGroupShape(g);
      return true;
    },
  });

  // Flare handle: sits at the tip of the flare (x = ±(gW/2 - notch), y = ±(gH/2 + flare)).
  // Dragging vertically changes how far the arrowhead extends beyond the body.
  const makeFlareControl = (side) => new fabric.Control({
    actionName: 'banner-flare-' + side,
    cursorStyle: 'ns-resize',
    render: _bannerHandleRender('#7aa2f7'),
    positionHandler: function(dim, finalMatrix, fabricObject) {
      const g = fabricObject;
      if (!_bannerHandleVisible(g, side, 'flare')) return new fabric.Point(-9999, -9999);
      const halfW = g.width / 2;
      const bodyH = g._bannerBodyH || g.height;
      const halfBodyH = bodyH / 2;
      const n = side === 'left' ? (g._bannerNotchL || 20) : (g._bannerNotchR || 20);
      const defaultFlare = bodyH * 0.15;
      const flare = side === 'left'
        ? (typeof g._bannerFlareL === 'number' ? g._bannerFlareL : defaultFlare)
        : (typeof g._bannerFlareR === 'number' ? g._bannerFlareR : defaultFlare);
      // Place above the body's top edge (not the group bbox, which includes flare).
      const lx = side === 'left' ? -halfW + n : halfW - n;
      const ly = -halfBodyH - flare;
      return localToCanvas(g, lx, ly);
    },
    actionHandler: function(eventData, transform, x, y) {
      const g = transform.target;
      const local = fabric.util.transformPoint(
        new fabric.Point(x, y),
        fabric.util.invertTransform(g.calcTransformMatrix())
      );
      const bodyH = g._bannerBodyH || g.height;
      const halfBodyH = bodyH / 2;
      // flare = how far above the body the head peaks. Clamp 0..1.5×body height
      // so dragging the handle can't produce runaway spikes.
      const flare = Math.max(0, Math.min(bodyH * 1.5, -halfBodyH - local.y));
      if (side === 'left') g._bannerFlareL = flare;
      else g._bannerFlareR = flare;
      rebuildBannerGroupShape(g);
      return true;
    },
  });

  group.controls.bannerTipL = makeTipControl('left');
  group.controls.bannerTipR = makeTipControl('right');
  group.controls.bannerFlareL = makeFlareControl('left');
  group.controls.bannerFlareR = makeFlareControl('right');
}

// How far the banner body is inset from the outer bounding box on each end.
// For "arrow" the head extends OUTSIDE the body (tip at x=0, body seam at x=n),
// so the inset equals the notch depth.
function bannerEndInset(end, n, h) {
  if (end === 'chevron' || end === 'arrow' || end === 'point') return n;
  if (end === 'round') return h / 2;
  return 0; // flat / slants / ribbon / scallop / tab — body flush with edge
}

// Shared point builder for banner shapes. `opts` is optional; currently supports
// `flareL` / `flareR` — how far each arrow head flares beyond the body height
// (ignored for non-arrow ends). When omitted, a sensible default is used.
function buildBannerGroupPoints(w, h, leftEnd, rightEnd, nL, nR, sw, opts) {
  const pts = [];
  const ROUND_SEGS = 12;
  const s = (sw || 0) / 2;
  const r = h / 2;
  const ri = r - s;
  const defaultFlare = h * 0.15;
  const flareL = (opts && typeof opts.flareL === 'number') ? opts.flareL : defaultFlare;
  const flareR = (opts && typeof opts.flareR === 'number') ? opts.flareR : defaultFlare;

  // Helper: add right-side end points (going top→bottom on right edge)
  function addRightEnd(end, n) {
    if (end === 'point') {
      pts.push({x:w-n, y:s}); pts.push({x:w-s, y:h/2}); pts.push({x:w-n, y:h-s});
    } else if (end === 'chevron') {
      pts.push({x:w-s, y:s}); pts.push({x:w-n, y:h/2}); pts.push({x:w-s, y:h-s});
    } else if (end === 'round') {
      pts.push({x:w-r, y:s});
      for (let i = 0; i <= ROUND_SEGS; i++) {
        const a = -Math.PI/2 + (Math.PI * i / ROUND_SEGS);
        pts.push({x: w - r + ri * Math.cos(a), y: r + ri * Math.sin(a)});
      }
    } else if (end === 'arrow') {
      // Arrow: banner body at full height, then a pointed arrowhead.
      // Body seam sits at x = w - n; tip at x = w - s; flare extends above/below
      // the body by `flareR` pixels.
      const headLen = n;
      const flare = flareR;
      pts.push({x:w-headLen, y:s});                // body top-right corner
      pts.push({x:w-headLen, y:s - flare});        // head flares up beyond body
      pts.push({x:w-s, y:h/2});                   // arrow tip
      pts.push({x:w-headLen, y:h-s + flare});     // head flares down beyond body
      pts.push({x:w-headLen, y:h-s});              // body bottom-right corner
    } else if (end === 'ribbon') {
      // Ribbon tail: folds inward at the midpoint
      const foldDepth = n * 0.6;
      pts.push({x:w-s, y:s});
      pts.push({x:w-foldDepth-s, y:h/2});
      pts.push({x:w-s, y:h-s});
    } else if (end === 'slant-l') {
      // Slant left: top extends further right than bottom
      pts.push({x:w-s, y:s}); pts.push({x:w-n, y:h-s});
    } else if (end === 'slant-r') {
      // Slant right: bottom extends further right than top
      pts.push({x:w-n, y:s}); pts.push({x:w-s, y:h-s});
    } else if (end === 'scallop') {
      // Concave scoop — starts/ends at corners, curves inward by notch depth
      const depth = Math.min(n, w * 0.3);
      for (let i = 0; i <= ROUND_SEGS; i++) {
        const t = i / ROUND_SEGS; // 0 at top, 1 at bottom
        const y = s + t * (h - 2 * s);
        const scoop = depth * Math.sin(t * Math.PI);
        pts.push({x: w - s - scoop, y: y});
      }
    } else if (end === 'tab') {
      // Stepped notch: flat edge with rectangular cutout center
      const tabH = h * 0.25;
      const tabD = n * 0.5;
      pts.push({x:w-s, y:s});
      pts.push({x:w-s, y:h/2-tabH});
      pts.push({x:w-tabD-s, y:h/2-tabH});
      pts.push({x:w-tabD-s, y:h/2+tabH});
      pts.push({x:w-s, y:h/2+tabH});
      pts.push({x:w-s, y:h-s});
    } else { // flat
      pts.push({x:w-s, y:s}); pts.push({x:w-s, y:h-s});
    }
  }

  // Helper: add left-side end points (going bottom→top on left edge)
  function addLeftEnd(end, n) {
    if (end === 'point') {
      pts.push({x:n, y:h-s}); pts.push({x:s, y:h/2});
    } else if (end === 'chevron') {
      pts.push({x:s, y:h-s}); pts.push({x:n, y:h/2});
    } else if (end === 'round') {
      pts.push({x:r, y:h-s});
      for (let i = 0; i <= ROUND_SEGS; i++) {
        const a = Math.PI/2 + (Math.PI * i / ROUND_SEGS);
        pts.push({x: r + ri * Math.cos(a), y: r + ri * Math.sin(a)});
      }
    } else if (end === 'arrow') {
      // Arrow: mirror of right arrow. Body seam at x = n, tip at x = s.
      const headLen = n;
      const flare = flareL;
      pts.push({x:headLen, y:h-s});                // body bottom-left corner
      pts.push({x:headLen, y:h-s + flare});        // head flares down
      pts.push({x:s, y:h/2});                      // arrow tip
      pts.push({x:headLen, y:s - flare});          // head flares up
      pts.push({x:headLen, y:s});                   // body top-left corner
    } else if (end === 'ribbon') {
      const foldDepth = n * 0.6;
      pts.push({x:s, y:h-s});
      pts.push({x:foldDepth+s, y:h/2});
      pts.push({x:s, y:s});
    } else if (end === 'slant-l') {
      // Mirror of right slant-l: bottom extends further left
      pts.push({x:n, y:h-s}); pts.push({x:s, y:s});
    } else if (end === 'slant-r') {
      // Mirror of right slant-r: top extends further left
      pts.push({x:s, y:h-s}); pts.push({x:n, y:s});
    } else if (end === 'scallop') {
      // Concave scoop — mirror of right scallop, bottom to top
      const depth = Math.min(n, w * 0.3);
      for (let i = 0; i <= ROUND_SEGS; i++) {
        const t = i / ROUND_SEGS; // 0 at bottom, 1 at top
        const y = (h - s) - t * (h - 2 * s);
        const scoop = depth * Math.sin(t * Math.PI);
        pts.push({x: s + scoop, y: y});
      }
    } else if (end === 'tab') {
      const tabH = h * 0.25;
      const tabD = n * 0.5;
      pts.push({x:s, y:h-s});
      pts.push({x:s, y:h/2+tabH});
      pts.push({x:tabD+s, y:h/2+tabH});
      pts.push({x:tabD+s, y:h/2-tabH});
      pts.push({x:s, y:h/2-tabH});
      pts.push({x:s, y:s});
    } else { // flat
      pts.push({x:s, y:h-s});
    }
  }

  // Top-left starting point
  if (leftEnd === 'point') pts.push({x:nL, y:s});
  else if (leftEnd === 'arrow') pts.push({x:nL, y:s});
  else if (leftEnd === 'round') pts.push({x:r, y:s});
  else if (leftEnd === 'slant-r') pts.push({x:nL, y:s});
  else pts.push({x:s, y:s});

  // Right side
  addRightEnd(rightEnd, nR);

  // Left side
  addLeftEnd(leftEnd, nL);

  return pts;
}

function linkAsBannerGroup() {
  const active = canvas.getActiveObject();
  if (!active || active.type !== 'activeSelection') return;
  const objs = active._objects;
  const text = objs.find(o => o.type === 'textbox' || o.type === 'text' || o.type === 'i-text');
  if (!text) { alert('Select at least one shape + one text to link'); return; }

  // Find all non-text objects — these form the hit area
  const shapes = objs.filter(o => o !== text && o.type !== 'textbox' && o.type !== 'text' && o.type !== 'i-text');
  if (shapes.length === 0) { alert('Select at least one shape + one text to link'); return; }

  // Determine mode: single polygon → full banner group; anything else → hitbox group
  const isBanner = shapes.length === 1 && shapes[0].type === 'polygon';

  // Compute the hit box (union of all shape bounding rects)
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  shapes.forEach(s => {
    const b = s.getBoundingRect(true);
    if (b.left < minX) minX = b.left;
    if (b.top < minY) minY = b.top;
    if (b.left + b.width > maxX) maxX = b.left + b.width;
    if (b.top + b.height > maxY) maxY = b.top + b.height;
  });
  const hitW = maxX - minX, hitH = maxY - minY;

  // Infer padding from text position relative to hit box
  const tb = text.getBoundingRect(true);
  const padL = Math.max(0, Math.round(tb.left - minX));
  const padR = Math.max(0, Math.round(maxX - (tb.left + tb.width)));
  const padT = Math.max(0, Math.round(tb.top - minY));
  const padB = Math.max(0, Math.round(maxY - (tb.top + tb.height)));

  const group = active.toGroup();
  group._customName = text._customName || shapes[0]._customName || (isBanner ? 'Banner' : 'Linked');
  group._padL = padL; group._padR = padR;
  group._padT = padT; group._padB = padB;

  if (isBanner) {
    const poly = shapes[0];
    group._isBannerGroup = true;
    group._bannerLeftEnd = poly._bannerLeftEnd || 'flat';
    group._bannerRightEnd = poly._bannerRightEnd || 'flat';
    group._bannerNotchL = poly._bannerNotchL || 20;
    group._bannerNotchR = poly._bannerNotchR || 20;
    attachBannerGroupControls(group);
    rebuildBannerGroupShape(group);
  } else {
    group._isHitboxGroup = true;
  }

  recenterBannerText(group, false);

  canvas.requestRenderAll();
  refreshLayers();
  updateProps();
  saveUndo();
}

// autoSize: if true, scale font to fill available height. Default true.
function recenterBannerText(group, autoSize) {
  if (!group || (!group._isBannerGroup && !group._isHitboxGroup) || !group._objects) return;
  const text = group._objects.find(o => o.type === 'textbox' || o.type === 'text' || o.type === 'i-text');
  if (!text) return;
  const padL = group._padL || 0, padR = group._padR || 0;
  const padT = group._padT || 0, padB = group._padB || 0;
  const lineH = text.lineHeight || 1.16;
  const CAP_RATIO = 0.74;
  const fs = text.fontSize || 24;
  const glyphH = fs * CAP_RATIO;
  const glyphTopOffset = fs * (lineH - CAP_RATIO) / 2;

  // For banner groups: the banner AUTO-FITS to text natural width & glyph height
  // plus padding AND end insets (so chevrons/arrows don't eat text). For hitbox
  // groups: width stays manual, no resizing.
  let gW, gH, leftInset = 0, rightInset = 0;
  if (group._isBannerGroup) {
    const leftEnd = group._bannerLeftEnd || 'flat';
    const rightEnd = group._bannerRightEnd || 'flat';
    const nL = group._bannerNotchL || 20;
    const nR = group._bannerNotchR || 20;

    // Measure natural text width (not wrapped) by temporarily giving textbox
    // a huge width and reading the longest line.
    text.set('width', 10000);
    text.initDimensions();
    let naturalW = 0;
    if (typeof text.calcTextWidth === 'function') {
      naturalW = text.calcTextWidth();
    } else if (text.__lineWidths && text.__lineWidths.length) {
      naturalW = Math.max.apply(null, text.__lineWidths);
    } else {
      naturalW = text.width;
    }
    gH = Math.max(1, Math.round(glyphH + padT + padB));
    // End insets are computed against the body height (gH). For 'round' this
    // is h/2 — which can get very wide — but that's the shape the user chose.
    leftInset = bannerEndInset(leftEnd, nL, gH);
    rightInset = bannerEndInset(rightEnd, nR, gH);
    gW = Math.max(10, Math.round(leftInset + padL + naturalW + padR + rightInset));

    // Arrow flares extend above AND below the body. Expand the group's bbox so
    // the selection rect (and hit area) covers the flares instead of cropping
    // them. Body height is stashed on the group for handle/clamp code.
    const flareU = leftEnd === 'arrow' ? (typeof group._bannerFlareL === 'number' ? group._bannerFlareL : gH * 0.15) : 0;
    const flareV = rightEnd === 'arrow' ? (typeof group._bannerFlareR === 'number' ? group._bannerFlareR : gH * 0.15) : 0;
    const maxFlare = Math.max(flareU, flareV);
    const totalH = gH + 2 * maxFlare;

    // Always rebuild the polygon — flare changes don't alter gW/gH but DO change
    // the polygon's point set, so gating rebuild on dim changes drops those updates.
    group._bannerBodyH = gH;
    group.width = gW;
    group.height = totalH;
    const poly = group._objects.find(o => o.type === 'polygon');
    if (poly) {
      const pts = buildBannerGroupPoints(gW, gH, leftEnd, rightEnd, nL, nR, poly.strokeWidth || 0, {
        flareL: group._bannerFlareL,

  if (c.startsWith('#') && c.length === 4) {

  // Partial-frame controls — default all on (full frame). Sides remove an
  // entire edge; corners remove that corner's two arms; completeness (0..100)
  // scales each arm's length as a fraction of half the side. At 100% with all
  // sides + corners on, arms meet in the middle for a continuous edge.
  const sT = this._frameTop !== false;
  const sR = this._frameRight !== false;
  const sB = this._frameBottom !== false;

  const cTR = this._frameTR !== false;
  const cBR = this._frameBR !== false;
  const cBL = this._frameBL !== false;
  const compRaw = this._frameCompleteness;
  const comp = (compRaw === undefined ? 100 : Math.max(0, Math.min(100, compRaw))) / 100;

  const allCornersOn = cTL && cTR && cBR && cBL;

  // Fast path: classic full frame — keep the rounded-corner ring renderer.
  if (fullFrame) {
    ctx.beginPath();
    if (rO > 0) {
      ctx.moveTo(x + rO, y);
      ctx.lineTo(x + w - rO, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + rO);
      ctx.lineTo(x + w, y + h - rO);
      ctx.quadraticCurveTo(x + w, y + h, x + w - rO, y + h);
      ctx.lineTo(x + rO, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - rO);
      ctx.lineTo(x, y + rO);
      ctx.quadraticCurveTo(x, y, x + rO, y);

      ctx.rect(x, y, w, h);

  // side is disabled), fall back to a flat rect strip.

    else if (corner === 'BR') { cx = x + w; cy = y + h; sx = -1; sy = -1; }

    ctx.lineTo(cx + sx * th, cy + sy * (th + rI2));               // approach inner curve
    ctx.quadraticCurveTo(cx + sx * th, cy + sy * th, cx + sx * (th + rI2), cy + sy * th);
    ctx.lineTo(cx + sx * armH, cy + sy * th);                     // inner H-arm end
    ctx.closePath();
    ctx.fill();
  };
  drawBracket('TL', sT && cTL, sL && cTL);
  drawBracket('TR', sT && cTR, sR && cTR);
  drawBracket('BR', sB && cBR, sR && cBR);
  drawBracket('BL', sB && cBL, sL && cBL);
}

function addFrame() {
  const pad = 20;
  const thickness = 6;
  const f = new fabric.Rect({
    left: 0, top: 0, width: 10, height: 10,
    fill: '#87986A',
    stroke: null,
    strokeWidth: 0,
    _customName: 'Frame',
    _isFrame: true,
    _frameThickness: thickness,
    _frameRadius: 12,
    _framePadT: pad, _framePadR: pad, _framePadB: pad, _framePadL: pad,
    _frameOffset: pad,
  });
  f._render = frameRender;
  applyFramePadding(f);
  canvas.add(f);
  canvas.setActiveObject(f);
  canvas.requestRenderAll();
  refreshLayers();
  updateProps();
  saveUndo();
}

// Recompute frame rect dimensions from per-edge padding. No stroke, no clip —
// the custom _render draws the ring inside the rect bounds.
function applyFramePadding(f) {
  if (!f || !f._isFrame) return;
  if (f._render !== frameRender) f._render = frameRender;
  const pT = (f._framePadT || 0);
  const pR = (f._framePadR || 0);
  const pB = (f._framePadB || 0);
  const pL = (f._framePadL || 0);
  const w = Math.max(0, canvasW - pL - pR);
  const h = Math.max(0, canvasH - pT - pB);
  f.set({
    left: pL,
    top: pT,
    width: w,
    height: h,
    scaleX: 1,
    scaleY: 1,
    rx: 0, ry: 0, // ignore fabric's native rounding; we draw it ourselves
  });
  f.setCoords();
  f.dirty = true;
}

function setFramePad(side, val) {
  const f = canvas.getActiveObject();
  if (!f || !f._isFrame) return;
  const v = Math.max(0, +val);
  if (f._padLinked !== false) {
    f._framePadT = f._framePadR = f._framePadB = f._framePadL = v;
  } else {
    f['_framePad' + side] = v;
  }
  applyFramePadding(f);
  canvas.requestRenderAll();
  updateProps();
  saveUndo();
}

function togglePadLink() {
  const f = canvas.getActiveObject();
  if (!f || !f._isFrame) return;
  f._padLinked = f._padLinked === false ? true : false;
  if (f._padLinked) {
    // When re-linking, unify to the top value
    const v = f._framePadT || 0;
    f._framePadR = f._framePadB = f._framePadL = v;
    applyFramePadding(f);
    canvas.requestRenderAll();
  }
  updateProps();
}

function snapFrameToCanvas() {
  const f = canvas.getActiveObject();
  if (!f || !f._isFrame) return;
  f._framePadT = f._framePadR = f._framePadB = f._framePadL = 0;
  applyFramePadding(f);
  clearGuidelines();
  canvas.requestRenderAll();
  updateProps();
  saveUndo();
}

// One-shot: add a centered textbox on the active shape and auto-link via linkAsBannerGroup.
// Routes to banner group (polygon) or hitbox group (other shapes).
function addTextAndLinkToShape() {
  const shape = canvas.getActiveObject();
  if (!shape) return;
  if (shape.type === 'group' || shape.type === 'activeSelection') return;
  if (shape._isFrame) return;

  const bb = shape.getBoundingRect(true);
  // Default font sized to ~half the shape height, clamped
  const fontSize = Math.max(14, Math.min(72, Math.round(bb.height * 0.5)));
  const lineH = 1.16;
  const txtH = fontSize * lineH;
  // Wide textbox centered on shape, with some inset so linking infers reasonable padding
  const pad = Math.max(8, Math.round(Math.min(bb.width, bb.height) * 0.1));
  const txtW = Math.max(40, bb.width - pad * 2);
  const txt = new fabric.Textbox('Text', {
    left: bb.left + pad,
    top: bb.top + (bb.height - txtH) / 2,
    width: txtW,
    fontSize,
    fontFamily: 'Jost',
    fontWeight: 'bold',
    fill: '#FFFFFF',
    textAlign: 'center',
  });
  canvas.add(txt);

  // Build an ActiveSelection of shape + text, then route through linkAsBannerGroup
  const sel = new fabric.ActiveSelection([shape, txt], { canvas });
  canvas.setActiveObject(sel);
  linkAsBannerGroup();
}

// Legacy uniform-offset setter — now just sets all four paddings
function setFrameOffset(val) {
  const f = canvas.getActiveObject();
  if (!f || !f._isFrame) return;
  const v = Math.max(0, +val);
  f._framePadT = f._framePadR = f._framePadB = f._framePadL = v;
  f._frameOffset = v;
  applyFramePadding(f);
  canvas.requestRenderAll();
  updateProps();
  saveUndo();
}
function setFrameThickness(val) {
  const f = canvas.getActiveObject();
  if (!f || !f._isFrame) return;
  f._frameThickness = Math.max(0, +val);
  applyFramePadding(f);
  canvas.requestRenderAll();
  updateProps();
  saveUndo();
}
function setFrameRadius(val) {
  const f = canvas.getActiveObject();
  if (!f || !f._isFrame) return;
  f._frameRadius = Math.max(0, +val);
  f.dirty = true;
  canvas.requestRenderAll();
  updateProps();
  saveUndo();
}
// Toggle one edge of the frame on/off. Side is one of 'T','R','B','L'.
function toggleFrameSide(side) {
  const f = canvas.getActiveObject();
  if (!f || !f._isFrame) return;
  const key = { T: '_frameTop', R: '_frameRight', B: '_frameBottom', L: '_frameLeft' }[side];
  if (!key) return;
  f[key] = f[key] === false ? true : false;
  f.dirty = true;
  canvas.requestRenderAll();
  updateProps();
  saveUndo();
}
// Toggle one corner's contribution. Corner is one of 'TL','TR','BR','BL'.
function toggleFrameCorner(corner) {
  const f = canvas.getActiveObject();
  if (!f || !f._isFrame) return;
  const key = { TL: '_frameTL', TR: '_frameTR', BR: '_frameBR', BL: '_frameBL' }[corner];
  if (!key) return;
  f[key] = f[key] === false ? true : false;
  f.dirty = true;
  canvas.requestRenderAll();
  updateProps();
  saveUndo();
}
// Set how far each corner's arms extend along its sides (0..100%).
function setFrameCompleteness(val) {
  const f = canvas.getActiveObject();
  if (!f || !f._isFrame) return;
  f._frameCompleteness = Math.max(0, Math.min(100, +val));
  f.dirty = true;
  canvas.requestRenderAll();
  // Debounce undo during slider drag — one commit per settle, not per pixel.
  clearTimeout(f._compUndoTimer);
  f._compUndoTimer = setTimeout(() => { saveUndo(); f._compUndoTimer = null; }, 250);
}

function addImageFromFile() {
  const input = document.getElementById('image-input');
  input.onchange = function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      fabric.Image.fromURL(e.target.result, function(img) {
        // Scale to fit within canvas
        const maxW = canvasW * 0.6;
        const maxH = canvasH * 0.6;
        const scale = Math.min(maxW / img.width, maxH / img.height, 1);
        img.set({
          left: canvasW / 2 - (img.width * scale) / 2,
          top: canvasH / 2 - (img.height * scale) / 2,
          scaleX: scale,
          scaleY: scale,
          _customName: file.name.replace(/\.[^.]+$/, ''),
        });
        setupImageControls(img);
        canvas.add(img);
        canvas.setActiveObject(img);
        canvas.requestRenderAll();
        refreshLayers();
        updateProps();
      });
    };
    reader.readAsDataURL(file);
    this.value = '';
  };
  input.click();
}

function loadPreset(preset) {

  const h = preset === '16x9' ? 720 : 800;
  const name = preset === '16x9' ? 'New 16:9' : 'New 1:1';

  saveCurrentTabState();
  const id = createTab(name, w, h);

// --- Export ---
function showExportModal() { document.getElementById('export-modal').classList.add('show'); }
function hideExportModal() { document.getElementById('export-modal').classList.remove('show'); }

function doExport() {
  const format = document.getElementById('export-format').value;
  const quality = +document.getElementById('export-quality').value / 100;
  const scale = +document.getElementById('export-scale').value;

  // Deselect to remove selection handles
  canvas.discardActiveObject();
  clearGuidelines();
  canvas.requestRenderAll();

  const multiplier = scale;
  const mimeType = format === 'webp' ? 'image/webp' : format === 'jpeg' ? 'image/jpeg' : 'image/png';
  const ext = format;

  canvas.renderAll(); // synchronous — must commit before toDataURL

  const dataURL = canvas.toDataURL({
    format: format === 'jpeg' ? 'jpeg' : format,
    quality: quality,
    multiplier: multiplier,
    left: 0,
    top: 0,
    width: canvasW,
    height: canvasH,
    enableRetinaScaling: false,
  });

  // Download
  const tab = tabs.find(t => t.id === activeTabId);
  const baseName = tab ? tab.name : `thumbnail_${canvasW}x${canvasH}`;
  const link = document.createElement('a');
  link.download = `${baseName}.${ext}`;
  link.href = dataURL;
  link.click();

  hideExportModal();

  // Show file size estimate
  const bytes = Math.round((dataURL.length - `data:${mimeType};base64,`.length) * 0.75);
  const kb = (bytes / 1024).toFixed(1);
  document.getElementById('status-selection').textContent = `Exported ${ext.toUpperCase()} @ ${scale}x \u2014 ~${kb}KB`;
}

// --- JSON Save/Load ---
function saveJSON() {
  canvas.discardActiveObject();
  clearGuidelines();
  canvas.requestRenderAll();

  const json = canvas.toJSON(['_customName', 'lockUniScaling', 'lockMovementX', 'lockMovementY', 'lockScalingX', 'lockScalingY', 'lockRotation', '_bannerLeftEnd', '_bannerRightEnd', '_bannerNotchL', '_bannerNotchR', '_bannerFlareL', '_bannerFlareR', '_isBannerGroup','_isHitboxGroup','_isFrame','_frameOffset','_framePadT','_framePadR','_framePadB','_framePadL', '_padL', '_padR', '_padT', '_padB', 'paintFirst','_shadowSpread','_spreadStrokeBackup','_frameThickness','_frameRadius','_frameTop','_frameRight','_frameBottom','_frameLeft','_frameTL','_frameTR','_frameBR','_frameBL','_frameCompleteness','_padLinked','_cornerRadius','_innerShadow','_corners','_cornersLinked']);

  // Relativize image URLs — Fabric's toJSON bakes the resolved absolute URL,
  // which breaks portability across hosts/ports. Strip origin so src stays
  // e.g. "/assets/2026-06-25_thorell/foo.png".
  const origin = window.location.origin;
  const relativize = (obj) => {
    if (!obj) return;
    if (obj.type === 'image' && typeof obj.src === 'string' && obj.src.startsWith(origin)) {
      obj.src = obj.src.slice(origin.length);
    }
    if (Array.isArray(obj.objects)) obj.objects.forEach(relativize);
  };
  if (Array.isArray(json.objects)) json.objects.forEach(relativize);

  const meta = { canvasW, canvasH, exportVersion: 1 };
  const data = JSON.stringify({ meta, canvas: json }, null, 2);

  const tab = tabs.find(t => t.id === activeTabId);
  const baseName = tab ? tab.name : `thumbnail_${canvasW}x${canvasH}`;

  const blob = new Blob([data], { type: 'application/json' });
  const link = document.createElement('a');
  link.download = `${baseName}.json`;
  link.href = URL.createObjectURL(blob);
  link.click();
}

function loadJSON() {
  const input = document.getElementById('json-input');
  input.onchange = function() {
    const files = Array.from(this.files);
    if (!files.length) return;
    loadJSONFiles(files, 0);
    this.value = '';
  };
  input.click();
}

function loadJSONFiles(files, idx) {
  if (idx >= files.length) return;
  const file = files[idx];
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      const w = (data.meta && data.meta.canvasW) || 1280;
      const h = (data.meta && data.meta.canvasH) || 720;
      const tabName = file.name.replace(/\.json$/i, '');

      saveCurrentTabState();
      const id = createTab(tabName, w, h);
      activeTabId = id;
      initCanvas(w, h);

      const canvasData = data.canvas || data;

      const onDone = function() {
        reattachBehaviors();
        canvas.requestRenderAll();
        refreshLayers();
        renderTabs();
        document.getElementById('status-selection').textContent = `Loaded: ${tabName}`;
        document.getElementById('status-size').textContent = `${w} x ${h}`;
        // Load next file
        loadJSONFiles(files, idx + 1);
      };

      // Always use fabric's native loader — handles all types, props, nested groups, images
      canvas.loadFromJSON(canvasData, onDone);
    } catch(err) {
      alert('Error loading ' + file.name + ': ' + err.message);
      loadJSONFiles(files, idx + 1);
    }
  };
  reader.readAsText(file);
}

// Insert a pattern into the CURRENT canvas (merge, not replace).
// Patterns are JSON files at templates/patterns/*.json with shape:
//   { name, description, canvasRef, tweakable, objects: [ ... fabric objects ... ] }
// Two call forms:
//   insertPattern()         — opens a file picker (user flow)
//   insertPattern(path)     — fetches the pattern from that URL (agent / scripted flow)
function insertPattern(path) {
  // Programmatic form: fetch the given path directly
  if (typeof path === 'string') {
    return fetch(path)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(data => applyPatternData(data, path.split('/').pop().replace(/\.json$/i, '')));
  }
  // Interactive form: file picker
  const input = document.getElementById('pattern-input');
  input.onchange = function() {
    const file = this.files[0];
    this.value = '';
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        applyPatternData(data, file.name.replace(/\.json$/i, ''));
      } catch(err) {
        alert('Error inserting ' + file.name + ': ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Shared pattern-insert logic used by both forms above.
function applyPatternData(data, fallbackName) {
  return new Promise((resolve) => {
    const objsJson = data.objects
      || (data.canvas && data.canvas.objects)
      || (data.fabricObject ? [data.fabricObject] : null);
    if (!objsJson || !objsJson.length) {
      alert('Pattern has no objects to insert: ' + (data.name || fallbackName));
      resolve([]);
      return;
    }
    fabric.util.enlivenObjects(objsJson, function(enlivened) {
      const added = [];
      enlivened.forEach(obj => {
        canvas.add(obj);
        added.push(obj);
      });
      reattachBehaviors();
      canvas.requestRenderAll();
      refreshLayers();
      if (added.length === 1) {
        canvas.setActiveObject(added[0]);
      } else if (added.length > 1) {
        const sel = new fabric.ActiveSelection(added, { canvas });
        canvas.setActiveObject(sel);
      }
      canvas.requestRenderAll();
      saveUndo();
      document.getElementById('status-selection').textContent =
        `Inserted pattern: ${data.name || fallbackName} (${added.length} objects)`;
      resolve(added);
    });
  });
}

// Save the current selection as a reusable pattern.
// Prompts for name + description, downloads a pattern JSON the user drops
// into templates/patterns/. The downloaded file follows the pattern schema:
//   { name, description, canvasRef, tweakable, objects: [ ... ] }
function saveAsPattern() {
  const active = canvas.getActiveObject();
  if (!active) {
    alert('Select one or more objects first, then click Save as Pattern.');
    return;
  }
  const selected = active.type === 'activeSelection' ? active.getObjects() : [active];

  const name = prompt(
    'Pattern name (slug — lowercase with dashes, e.g. "bottom-strip-date-banner"):',
    ''
  );
  if (!name) return;
  const description = prompt(
    'Short description (what is this pattern for? when to use it?):',
    ''
  ) || '';

  // Same extra-prop list saveJSON uses, so banner/frame/etc. metadata is preserved
  const EXTRA = ['_customName', 'lockUniScaling', 'lockMovementX', 'lockMovementY', 'lockScalingX', 'lockScalingY', 'lockRotation', '_bannerLeftEnd', '_bannerRightEnd', '_bannerNotchL', '_bannerNotchR', '_bannerFlareL', '_bannerFlareR', '_isBannerGroup','_isHitboxGroup','_isFrame','_frameOffset','_framePadT','_framePadR','_framePadB','_framePadL', '_padL', '_padR', '_padT', '_padB', 'paintFirst','_shadowSpread','_spreadStrokeBackup','_frameThickness','_frameRadius','_frameTop','_frameRight','_frameBottom','_frameLeft','_frameTL','_frameTR','_frameBR','_frameBL','_frameCompleteness','_padLinked','_cornerRadius','_innerShadow','_corners','_cornersLinked'];

  const objsJson = selected.map(o => o.toObject(EXTRA));

  // Relativize image URLs so the pattern is portable across hosts/ports
  const origin = window.location.origin;
  const relativize = (obj) => {
    if (!obj) return;
    if (obj.type === 'image' && typeof obj.src === 'string' && obj.src.startsWith(origin)) {
      obj.src = obj.src.slice(origin.length);
    }
    if (Array.isArray(obj.objects)) obj.objects.forEach(relativize);
  };
  objsJson.forEach(relativize);

  // Auto-generate a tweakable stub so the agent/user sees what's customizable.
  // Filled in by hand post-save — this is just scaffolding.
  const tweakable = {};
  objsJson.forEach((obj, i) => {
    const kind = obj._isBannerGroup ? 'banner'
      : obj._isFrame ? 'frame'
      : obj.type;
    const label = obj._customName || `unnamed-${kind}`;
    tweakable[`objects[${i}]`] = `${kind} "${label}" — edit this file to describe which fields are intended tweakable`;
  });

  const pattern = {
    name,
    description,
    canvasRef: { w: canvasW, h: canvasH },
    tweakable,
    objects: objsJson
  };

  const ratioTag = (canvasW === canvasH) ? '1x1'
    : (Math.abs(canvasW / canvasH - 16/9) < 0.01) ? '16x9'
    : `${canvasW}x${canvasH}`;
  const filename = `${name}_${ratioTag}.json`;

  const blob = new Blob([JSON.stringify(pattern, null, 2)], { type: 'application/json' });
  const link = document.createElement('a');
  link.download = filename;
  link.href = URL.createObjectURL(blob);
  link.click();

  document.getElementById('status-selection').textContent =
    `Saved pattern: ${filename} (${selected.length} object${selected.length === 1 ? '' : 's'}) — move to templates/patterns/`;
}

function loadObjectsSequentially(objects, idx, done) {
  if (idx >= objects.length) { done(); return; }
  const o = objects[idx];
  const next = () => loadObjectsSequentially(objects, idx + 1, done);

  if (o.type === 'image' && o.src) {
    fabric.Image.fromURL(o.src, function(img) {
      img.set({
        left: o.left || 0,
        top: o.top || 0,
        scaleX: o.scaleX || 1,
        scaleY: o.scaleY || 1,
        angle: o.angle || 0,
        opacity: o.opacity != null ? o.opacity : 1,
        _customName: o._customName || 'Image',
        selectable: o.selectable !== false,
        evented: o.evented !== false,
        cropX: o.cropX || 0,
        cropY: o.cropY || 0,
        width: o.width || img.width,
        height: o.height || img.height,
        _cornerRadius: o._cornerRadius || 0,
      });
      setupImageControls(img);
      if (o._cornerRadius && o._cornerRadius > 0) setImageCornerRadiusOn(img, o._cornerRadius);
      // Apply clipPath for cover-style cropping
      if (o.clipPath && o.clipPath.type === 'rect') {
        const cp = new fabric.Rect({
          left: o.clipPath.left || 0,
          top: o.clipPath.top || 0,
          width: o.clipPath.width || 100,
          height: o.clipPath.height || 100,
          absolutePositioned: !!o.clipPath.absolutePositioned,
        });
        img.clipPath = cp;
      }
      canvas.add(img);
      next();
    }, { crossOrigin: 'anonymous' });
  } else if (o.type === 'rect') {
    const r = new fabric.Rect({
      left: o.left || 0, top: o.top || 0,
      width: o.width || 100, height: o.height || 100,
      fill: o.fill || '#333',
      rx: o.rx || 0, ry: o.ry || 0,
      angle: o.angle || 0,
      opacity: o.opacity != null ? o.opacity : 1,
      selectable: o.selectable !== false,
      evented: o.evented !== false,
      _customName: o._customName || 'Rectangle',
    });
    canvas.add(r);
    next();
  } else if (o.type === 'textbox' || o.type === 'text' || o.type === 'i-text') {
    const t = new fabric.Textbox(o.text || '', {
      left: o.left || 0, top: o.top || 0,
      width: o.width || 200,
      fontSize: o.fontSize || 24,
      fontFamily: o.fontFamily || 'Arial',
      fontWeight: o.fontWeight || 'normal',
      fill: o.fill || '#fff',
      textAlign: o.textAlign || 'left',
      angle: o.angle || 0,
      opacity: o.opacity != null ? o.opacity : 1,
      _customName: o._customName || 'Text',
    });
    canvas.add(t);
    next();
  } else if (o.type === 'circle') {
    const c2 = new fabric.Circle({
      left: o.left || 0, top: o.top || 0,
      radius: o.radius || 50,
      fill: o.fill || '#333',
      angle: o.angle || 0,
      opacity: o.opacity != null ? o.opacity : 1,
      _customName: o._customName || 'Circle',
    });
    canvas.add(c2);
    next();
  } else if (o.type === 'triangle') {
    const tri = new fabric.Triangle({
      left: o.left || 0, top: o.top || 0,
      width: o.width || 100, height: o.height || 100,
      fill: o.fill || '#333',
      angle: o.angle || 0,
      scaleX: o.scaleX || 1, scaleY: o.scaleY || 1,
      opacity: o.opacity != null ? o.opacity : 1,
      _customName: o._customName || 'Triangle',
    });
    canvas.add(tri);
    next();
  } else if (o.type === 'polygon' && o.points) {
    const poly = new fabric.Polygon(o.points, {
      left: o.left || 0, top: o.top || 0,
      fill: o.fill || '#333',
      angle: o.angle || 0,
      scaleX: o.scaleX || 1, scaleY: o.scaleY || 1,
      opacity: o.opacity != null ? o.opacity : 1,
      _customName: o._customName || 'Polygon',
    });
    canvas.add(poly);
    next();
  } else {
    next();
  }
}

// --- Modals ---
function showAddModal() { document.getElementById('add-modal').classList.add('show'); }
function hideAddModal() { document.getElementById('add-modal').classList.remove('show'); }

// --- Undo / Redo ---
let undoStack = [];
let redoStack = [];
let undoLocked = false;
const MAX_UNDO = 40;

function saveUndo() {
  if (undoLocked || !canvas) return;
  const json = JSON.stringify(canvas.toJSON(['_customName','selectable','evented','lockMovementX','lockMovementY','lockScalingX','lockScalingY','lockRotation','_bannerLeftEnd','_bannerRightEnd','_bannerNotchL','_bannerNotchR','_isBannerGroup','_isHitboxGroup','_isFrame','_frameOffset','_framePadT','_framePadR','_framePadB','_framePadL','_padL','_padR','_padT','_padB','paintFirst','_shadowSpread','_spreadStrokeBackup','_frameThickness','_frameRadius','_padLinked','_cornerRadius','_innerShadow','_corners','_cornersLinked']));
  // Don't push if identical to top of stack
  if (undoStack.length && undoStack[undoStack.length - 1] === json) return;
  undoStack.push(json);
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (!canvas || undoStack.length < 1) return;
  // Save current state to redo
  const cur = JSON.stringify(canvas.toJSON(['_customName','selectable','evented','lockMovementX','lockMovementY','lockScalingX','lockScalingY','lockRotation','_bannerLeftEnd','_bannerRightEnd','_bannerNotchL','_bannerNotchR','_isBannerGroup','_isHitboxGroup','_isFrame','_frameOffset','_framePadT','_framePadR','_framePadB','_framePadL','_padL','_padR','_padT','_padB','paintFirst','_shadowSpread','_spreadStrokeBackup','_frameThickness','_frameRadius','_padLinked','_cornerRadius','_innerShadow','_corners','_cornersLinked']));
  redoStack.push(cur);
  const prev = undoStack.pop();
  restoreState(prev);
}

function redo() {
  if (!canvas || redoStack.length < 1) return;
  // Save current to undo
  const cur = JSON.stringify(canvas.toJSON(['_customName','selectable','evented','lockMovementX','lockMovementY','lockScalingX','lockScalingY','lockRotation','_bannerLeftEnd','_bannerRightEnd','_bannerNotchL','_bannerNotchR','_isBannerGroup','_isHitboxGroup','_isFrame','_frameOffset','_framePadT','_framePadR','_framePadB','_framePadL','_padL','_padR','_padT','_padB','paintFirst','_shadowSpread','_spreadStrokeBackup','_frameThickness','_frameRadius','_padLinked','_cornerRadius','_innerShadow','_corners','_cornersLinked']));
  undoStack.push(cur);
  const next = redoStack.pop();
  restoreState(next);
}

function restoreState(json) {
  undoLocked = true;
  canvas.loadFromJSON(json, function() {
    reattachBehaviors();
    refreshLayers();
    updateProps();
    undoLocked = false;
  });
}

// --- Right-click Context Menu ---
function showContextMenu(e) {
  e.preventDefault();
  e.stopPropagation();
  const menu = document.getElementById('context-menu');
  const obj = canvas.getActiveObject();
  const hasObj = !!obj;
  const isGroup = hasObj && obj.type === 'group';
  const isBanner = isGroup && obj._isBannerGroup;
  const isMulti = hasObj && obj.type === 'activeSelection';
  const hasMultiWithPolyAndText = isMulti && obj._objects &&
    obj._objects.some(o => o.type === 'polygon') &&
    obj._objects.some(o => o.type === 'textbox' || o.type === 'text' || o.type === 'i-text');

  let html = '';
  // Always available
  html += `<div class="ctx-item" onclick="undo(); hideContextMenu()">Undo <span class="shortcut">Ctrl+Z</span></div>`;
  html += `<div class="ctx-item" onclick="redo(); hideContextMenu()">Redo <span class="shortcut">Ctrl+Y</span></div>`;
  html += '<div class="ctx-sep"></div>';

  if (hasObj) {
    html += `<div class="ctx-item" onclick="duplicateLayer(); hideContextMenu()">Duplicate <span class="shortcut">Ctrl+D</span></div>`;
    html += `<div class="ctx-item" onclick="deleteLayer(); hideContextMenu()">Delete <span class="shortcut">Del</span></div>`;
    html += '<div class="ctx-sep"></div>';
    html += `<div class="ctx-item" onclick="moveLayer('up'); hideContextMenu()">Move Up</div>`;
    html += `<div class="ctx-item" onclick="moveLayer('down'); hideContextMenu()">Move Down</div>`;
    html += '<div class="ctx-sep"></div>';

    if (isMulti) {
      html += `<div class="ctx-item" onclick="groupSelected(); hideContextMenu()">Group <span class="shortcut">Ctrl+G</span></div>`;
      if (hasMultiWithPolyAndText) {
        html += `<div class="ctx-item" onclick="linkAsBannerGroup(); hideContextMenu()">Link as Banner</div>`;
      }
    }
    if (isGroup && !isBanner) {
      html += `<div class="ctx-item" onclick="ungroupSelected(); hideContextMenu()">Ungroup <span class="shortcut">Ctrl+Shift+G</span></div>`;
    }
    if (isBanner) {
      html += `<div class="ctx-item" onclick="ungroupSelected(); hideContextMenu()">Ungroup Banner</div>`;
    }

    // Lock/unlock
    const locked = obj.lockMovementX;
    html += '<div class="ctx-sep"></div>';
    html += `<div class="ctx-item" onclick="toggleLockActive(); hideContextMenu()">${locked ? 'Unlock' : 'Lock'}</div>`;
    // Visibility
    html += `<div class="ctx-item" onclick="toggleVisActive(); hideContextMenu()">${obj.visible === false ? 'Show' : 'Hide'}</div>`;
  } else {
    // No selection
    html += `<div class="ctx-item" onclick="showAddModal(); hideContextMenu()">Add Element</div>`;
    html += `<div class="ctx-item" onclick="loadJSON(); hideContextMenu()">Load JSON</div>`;
  }

  menu.innerHTML = html;
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.classList.add('show');

  // Ensure menu stays on screen
  requestAnimationFrame(() => {
    const rect = menu.getBoundingClientRect();
    if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 4) + 'px';
    if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 4) + 'px';
  });
}

function hideContextMenu() {
  document.getElementById('context-menu').classList.remove('show');
}

function toggleLockActive() {
  const obj = canvas.getActiveObject();
  if (!obj) return;
  const locked = !obj.lockMovementX;
  obj.set({
    lockMovementX: locked, lockMovementY: locked,
    lockScalingX: locked, lockScalingY: locked,
    lockRotation: locked, hasControls: !locked,
  });
  canvas.requestRenderAll(); refreshLayers();
}

function toggleVisActive() {
  const obj = canvas.getActiveObject();
  if (!obj) return;
  obj.visible = !obj.visible;
  canvas.requestRenderAll(); refreshLayers();
}

// Attach right-click to canvas area
document.getElementById('canvas-area').addEventListener('contextmenu', showContextMenu);
// Close context menu on any click
document.addEventListener('click', hideContextMenu);
document.addEventListener('mousedown', function(e) {
  if (!document.getElementById('context-menu').contains(e.target)) hideContextMenu();
});

// --- Keyboard Shortcuts ---
document.addEventListener('keydown', function(e) {
  // Delete
  if ((e.key === 'Delete' || e.key === 'Backspace') && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    const obj = canvas.getActiveObject();
    if (obj && obj.type !== 'textbox' || (obj && !obj.isEditing)) {
      deleteLayer();
      e.preventDefault();
    }
  }
  // Ctrl+Z undo / Ctrl+Y or Ctrl+Shift+Z redo
  if (e.ctrlKey && e.key === 'z' && !e.shiftKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    undo();
    return;
  }
  if ((e.ctrlKey && e.key === 'y') || (e.ctrlKey && e.shiftKey && e.key === 'Z')) {
    if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      e.preventDefault();
      redo();
      return;
    }
  }
  // Ctrl+G group / Ctrl+Shift+G ungroup
  if (e.ctrlKey && e.key === 'g' && !e.shiftKey) {
    e.preventDefault();
    groupSelected();
    return;
  }
  if (e.ctrlKey && e.shiftKey && e.key === 'G') {
    e.preventDefault();
    ungroupSelected();
    return;
  }
  // Ctrl+D duplicate
  if (e.ctrlKey && e.key === 'd') {
    e.preventDefault();
    duplicateLayer();
  }
  // Ctrl+S save
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    saveJSON();
  }
  // Ctrl+E export
  if (e.ctrlKey && e.key === 'e') {
    e.preventDefault();
    showExportModal();
  }
  // Escape
  if (e.key === 'Escape') {
    canvas.discardActiveObject();
    clearGuidelines();
    canvas.requestRenderAll();
    refreshLayers();
    updateProps();
    hideExportModal();
    hideAddModal();
  }
  // Arrow keys for nudging
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key) && document.activeElement.tagName !== 'INPUT') {
    const obj = canvas.getActiveObject();
    if (!obj || obj.lockMovementX) return;
    e.preventDefault();
    const step = e.shiftKey ? 10 : 1;
    if (e.key === 'ArrowLeft') obj.set('left', obj.left - step);
    if (e.key === 'ArrowRight') obj.set('left', obj.left + step);
    if (e.key === 'ArrowUp') obj.set('top', obj.top - step);
    if (e.key === 'ArrowDown') obj.set('top', obj.top + step);
    obj.setCoords();
    canvas.requestRenderAll();
    updateProps();
  }
});

// Close modals on background click
document.getElementById('export-modal').addEventListener('click', function(e) { if (e.target === this) hideExportModal(); });
document.getElementById('add-modal').addEventListener('click', function(e) { if (e.target === this) hideAddModal(); });

// --- Auto-load from URL query params ---
// Usage: editor.html?load=output/16x9/foo_v1.json,output/1x1/foo_v1.json,...
async function autoLoadFromURL() {
  const params = new URLSearchParams(window.location.search);
  const loadParam = params.get('load');
  if (!loadParam) return;

  const paths = loadParam.split(',').map(p => p.trim()).filter(Boolean);
  if (!paths.length) return;

  console.log(`Auto-loading ${paths.length} JSON file(s)...`);
  for (const filePath of paths) {
    try {
      const resp = await fetch(filePath);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      const w = (data.meta && data.meta.canvasW) || 1280;
      const h = (data.meta && data.meta.canvasH) || 720;
      const tabName = filePath.split('/').pop().replace(/\.json$/i, '');

      saveCurrentTabState();
      const id = createTab(tabName, w, h);
      activeTabId = id;
      initCanvas(w, h);

      const canvasData = data.canvas || data;

      await new Promise((resolve, reject) => {
        const onDone = function() {
          reattachBehaviors();
          canvas.requestRenderAll();
          refreshLayers();
          renderTabs();
          document.getElementById('status-selection').textContent = `Loaded: ${tabName}`;
          document.getElementById('status-size').textContent = `${w} x ${h}`;
          resolve();
        };
        // Always use fabric's native loader — handles groups/banner groups,
        // frames, nested objects, and all property round-tripping. The old
        // loadObjectsSequentially path silently skipped `group` types.
        canvas.loadFromJSON(canvasData, onDone);
      });
      console.log(`  Loaded: ${tabName}`);
    } catch (err) {
      console.error(`Failed to load ${filePath}:`, err);
    }
  }

  // Switch to first tab
  if (tabs.length > 0) {
    switchToTab(tabs[0].id);
  }
}

// --- Boot ---
initCanvas(1280, 720);
renderTabs();
autoLoadFromURL();
</script>
